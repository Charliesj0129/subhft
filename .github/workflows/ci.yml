name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      run_recorder_drills:
        description: "Run recorder ClickHouse + WAL stress drills"
        required: false
        default: false
        type: boolean
      run_research_drills:
        description: "Run research wrapper benchmark/report artifacts"
        required: false
        default: false
        type: boolean
      run_diagnostics_drills:
        description: "Run diagnostics timeline artifact smoke"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "30 18 * * *" # Daily UTC nightly perf drill

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

env:
  PYTHONPATH: src
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  # ============================================================================
  # Stage 1: Lint & Format
  # ============================================================================
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-python-uv

      - name: Check formatting
        run: make format-check

      - name: Check linting
        run: make lint

      - name: HFT discipline enforcement
        run: make discipline

      - name: Detect float in financial paths
        run: |
          FOUND=$(grep -rnE ':\s*float\b|float\(' \
            src/hft_platform/order/ \
            src/hft_platform/risk/ \
            src/hft_platform/execution/ \
            --include='*.py' \
            | grep -v '# noqa' \
            | grep -v 'timestamp' \
            | grep -v 'latency' \
            | grep -v '_seconds' \
            | grep -v '_ratio' \
            | grep -v 'precision-' \
            | grep -v '_interval' \
            | grep -v 'interval_s' \
            | grep -v 'concentration' \
            | grep -v 'last_sync_ts' \
            | grep -v 'checkpoint' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::float usage detected in financial code paths:"
            echo "$FOUND"
            echo "Use Decimal or scaled int for prices/balances (see CLAUDE.md Precision Law)."
            exit 1
          fi

      - name: Detect print() in production code
        run: |
          FOUND=$(grep -rnE '^\s*print\(' src/hft_platform/ --include='*.py' \
            | grep -v '__main__' \
            | grep -v 'cli/' \
            | grep -v 'cli.py' \
            | grep -v '# noqa' \
            | grep -v 'testing/' \
            | grep -v 'config/wizard' \
            | grep -v 'alpha/latency_audit' \
            | grep -v 'alpha/paper_trade' \
            | grep -v '/scripts/' \
            | grep -v 'ipc/' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::print() detected in production code (use structlog):"
            echo "$FOUND"
            exit 1
          fi

      - name: Detect conflict markers (AWG-03)
        run: |
          CONFLICTS=$(grep -rnE '^<<<<<<< |^=======$|^>>>>>>> ' src/ tests/ docs/ --include='*.py' --include='*.md' --include='*.yaml' --include='*.yml' --include='*.toml' || true)
          if [ -n "$CONFLICTS" ]; then
            echo "::error::Conflict markers found in tracked files — resolve before merge:"
            echo "$CONFLICTS"
            exit 1
          fi

      - name: Detect worktree artifacts
        run: |
          if find .claude/worktrees/ -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -1 | grep -q .; then
            echo "::error::Worktree directories found in .claude/worktrees/ — clean up before merge"
            exit 1
          fi

      - name: Architecture conformance gate
        run: make arch-gate

      - name: Test collection zero-error gate
        run: make test-collection-check

      - name: Test assertion enforcement gate
        run: make test-assertion-check

      - name: Test naming enforcement gate
        run: make test-name-check

      - name: Weak test-pattern enforcement gate
        run: make test-quality-pattern-check

      - name: Enforce research factory contract
        run: make research-audit-strict

      - name: Guard env vars reference coverage
        run: make env-vars-guard

      - name: Enforce TODO/ROADMAP delivery governance
        run: make roadmap-delivery-check

      - name: Upload roadmap delivery artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: roadmap-delivery-report
          path: |
            outputs/roadmap_delivery/latest.json
            outputs/roadmap_delivery/latest.md
          if-no-files-found: warn

      - name: Roadmap delivery summary
        if: always()
        run: |
          echo "## 🗺️ Roadmap Delivery Guard" >> $GITHUB_STEP_SUMMARY
          python - <<'PY' >> $GITHUB_STEP_SUMMARY || true
          import json
          from pathlib import Path

          summary = Path("outputs/roadmap_delivery/latest.json")
          if not summary.exists():
              print("- report: not found")
              raise SystemExit(0)

          payload = json.loads(summary.read_text(encoding="utf-8"))
          result = payload.get("result", {}) if isinstance(payload.get("result"), dict) else {}
          checks = result.get("checks", []) if isinstance(result.get("checks"), list) else []
          failed = [c for c in checks if isinstance(c, dict) and str(c.get("status")) == "fail"]

          print(f"- overall: `{result.get('overall', 'unknown')}`")
          print(f"- recommendation: `{result.get('recommendation', 'unknown')}`")
          print(f"- checks: total={len(checks)}, failed={len(failed)}")
          for row in failed[:10]:
              print(f"  - `{row.get('id')}`: {row.get('message')}")
          if len(failed) > 10:
              print(f"  - ... and {len(failed) - 10} more failures")
          PY

  # ============================================================================
  # Stage 2a: Rust Build & Lint
  # ============================================================================
  rust:
    name: Rust Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_core/Cargo.lock', 'rust_core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path rust_core/Cargo.toml -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path rust_core/Cargo.toml -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path rust_core/Cargo.toml --no-default-features

      - name: Security audit (cargo audit)
        run: cargo install cargo-audit --locked && cargo audit --file rust_core/Cargo.lock

  # ============================================================================
  # Stage 2b: Type Check
  # ============================================================================
  typecheck:
    name: 🔬 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-python-uv

      - name: Run mypy
        run: make typecheck

  # ============================================================================
  # Stage 2c: Dependency Boundaries
  # ============================================================================
  dependency-boundary:
    name: Dependency Boundary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          version: "latest"

      - name: Enforce import contracts
        run: make dependency-boundary

  # ============================================================================
  # ============================================================================
  # Stage 3: Unit Tests + Coverage Gates
  # ============================================================================
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [typecheck, rust, dependency-boundary]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-python-uv
      - uses: ./.github/actions/setup-rust

      - name: Run unit tests with coverage
        run: make test-unit-ci

      - name: Check branch coverage
        run: make coverage-branch-gate

      - name: Upload coverage to GitHub Summary
        if: always()
        run: |
          echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          make coverage-markdown >> $GITHUB_STEP_SUMMARY || true

      - name: Repo Gate — no generated artifacts left behind
        if: always()
        run: |
          ARTIFACTS=""
          for f in coverage.json coverage_*.json; do
            [ -f "$f" ] && ARTIFACTS="$ARTIFACTS $f"
          done
          if [ -d "tests/benchmark/baselines" ] && [ "$(ls -A tests/benchmark/baselines 2>/dev/null)" ]; then
            ARTIFACTS="$ARTIFACTS tests/benchmark/baselines/"
          fi
          BASELINES=$(find tests/ -name "*.baseline.json" 2>/dev/null | head -5 || true)
          [ -n "$BASELINES" ] && ARTIFACTS="$ARTIFACTS $BASELINES"
          if [ -n "$ARTIFACTS" ]; then
            echo "::error::Repo Gate: generated artifacts left in working tree:$ARTIFACTS"
            echo "Add these patterns to .gitignore or clean up after test runs."
            exit 1
          fi

      - name: Upload Rust extension
        uses: actions/upload-artifact@ea165f8d65b6db9a6b7c67862cd61e8cbe7b0dbc  # v4
        with:
          name: rust-extension
          path: src/hft_platform/rust_core*.so
          retention-days: 1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================================
  # Stage 4: Benchmark (Darwin Gate)
  # ============================================================================
  benchmark:
    name: ⚡ Benchmark (Darwin Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-python-uv
      - name: Download Rust extension
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: rust-extension
          path: src/hft_platform/

      - name: Run lightweight perf regression gate (strategy/risk/gateway/research/feed/recorder)
        run: make perf-gate-default

      - name: Run benchmarks
        run: make benchmark-ci

      - name: Darwin Gate - Regression Check
        if: always() && hashFiles('benchmark.json') != ''
        run: make benchmark-darwin-gate

      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Benchmark Summary
        if: always()
        run: |
          echo "## ⚡ Benchmark Results" >> $GITHUB_STEP_SUMMARY
          if [ -f benchmark.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat benchmark.json | head -100 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No benchmark results found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Update benchmark baseline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if [ -f benchmark.json ]; then
            cp benchmark.json tests/benchmark/.benchmark_baseline.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add tests/benchmark/.benchmark_baseline.json
            git diff --cached --quiet || git commit -m "chore(ci): auto-update benchmark baseline [skip ci]"
            git push || echo "::warning::Could not push baseline update"
          fi

  # ============================================================================
  # Stage 4b: Latency Regression Gate (WU-19)
  # ============================================================================
  latency-gate:
    name: Latency Regression Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-python-uv
      - name: Download Rust extension
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: rust-extension
          path: src/hft_platform/

      - name: Run latency regression benchmarks
        run: make latency-gate-ci 2>&1 | tee latency_gate.log

      - name: Latency Gate Summary
        if: always()
        run: |
          echo "## Latency Regression Gate" >> $GITHUB_STEP_SUMMARY
          if [ -f latency_gate.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 latency_gate.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # Stage 5: Integration Tests
  # ============================================================================
  integration:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.12.3
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-python-uv
      - name: Download Rust extension
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: rust-extension
          path: src/hft_platform/

      - name: Run integration tests
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 8123
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: make test-integration-ci

      - name: Integration Test Summary
        if: always()
        run: |
          echo "## 🔗 Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "ClickHouse and Redis services were available for testing." >> $GITHUB_STEP_SUMMARY

      - name: Run ClickHouse writer system smoke
        env:
          HFT_CLICKHOUSE_HOST: localhost
          HFT_CLICKHOUSE_PORT: 8123
          HFT_CLICKHOUSE_ENABLED: "1"
        run: make test-clickhouse-writer-smoke

  recorder-nightly-drills:
    name: 🧪 Recorder CK + WAL Drills
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.run_recorder_drills || inputs.run_research_drills || inputs.run_diagnostics_drills))
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.12.3
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-python-uv
      - name: Download Rust extension
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: rust-extension
          path: src/hft_platform/

      - name: Run recorder perf gate (CK + WAL stress drills)
        run: make perf-gate-recorder-io

      - name: Run gateway/WAL hardening integration drills (CE2-08/09, CE3-03/04/07)
        if: github.event_name == 'schedule' || inputs.run_recorder_drills
        run: make drill-gateway-wal-hardening

      - name: Run risk/gateway perf gate (heavier drills)
        run: make perf-gate-risk-heavy

      - name: Run feature-plane perf gate (Rust parity/perf drills)
        run: make perf-gate-feature-rust

      - name: Run research feature benchmark matrix wrapper
        if: github.event_name == 'schedule' || inputs.run_research_drills
        run: make research-feature-benchmark-matrix

      - name: Render synthetic research promotion report artifact
        if: github.event_name == 'schedule' || inputs.run_research_drills
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = {
              "alpha_id": "nightly-smoke",
              "validation": {"passed": True},
              "feature_profile_validation_errors": [],
              "promotion": {"approved": False, "canary_weight": 0.0, "reasons": ["nightly_wrapper_smoke_only"]},
          }
          Path("research_feature_promotion_smoke.json").write_text(json.dumps(payload), encoding="utf-8")
          PY
          make render-research-promotion-report

      - name: Render diagnostics timeline artifact (synthetic)
        if: github.event_name == 'schedule' || inputs.run_diagnostics_drills
        run: |
          python - <<'PY'
          import json, time
          from pathlib import Path
          base = time.time_ns()
          rows = [
              {"ts_ns": base, "stage": "md_event", "trace_id": "nightly:t1", "payload": {"symbol": "2330", "event_type": "BidAskEvent"}},
              {"ts_ns": base + 1_000, "stage": "strategy_dispatch_done", "trace_id": "nightly:t1", "payload": {"strategy_id": "s1", "intent_count": 1}},
              {"ts_ns": base + 2_000, "stage": "risk_approve", "trace_id": "nightly:t1", "payload": {"stage": "evaluate"}},
              {"ts_ns": base + 3_000, "stage": "order_dispatch_ok", "trace_id": "nightly:t1", "payload": {"cmd_id": 1}},
          ]
          Path("nightly_trace.jsonl").write_text("".join(json.dumps(r, ensure_ascii=False) + "\\n" for r in rows), encoding="utf-8")
          PY
          make render-incident-timeline-json
          make render-incident-timeline-md

      - name: Upload risk nightly perf artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: risk-perf-gate-nightly
          path: risk_perf_gate.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload gateway/WAL hardening drill log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: gateway-wal-hardening-drills
          path: gateway_wal_hardening_drills.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload feature nightly perf artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: feature-perf-gate-nightly
          path: feature_perf_gate.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload research nightly artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: research-nightly-artifacts
          path: |
            research_feature_benchmark_matrix.json
            research_feature_promotion_smoke.json
            research_feature_promotion_report.md
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload diagnostics nightly artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: diagnostics-nightly-artifacts
          path: |
            nightly_trace.jsonl
            diagnostics_timeline.json
            diagnostics_timeline.md
          if-no-files-found: ignore
          retention-days: 30

      - name: Recorder Drill Summary
        if: always()
        run: |
          echo "## 🧪 Nightly Performance Drills" >> $GITHUB_STEP_SUMMARY
          echo "Executed perf_regression_gate with recorder (real ClickHouse + WAL stress) and risk/gateway heavier drills." >> $GITHUB_STEP_SUMMARY
          if [ -f gateway_wal_hardening_drills.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Gateway/WAL Hardening Drills" >> $GITHUB_STEP_SUMMARY
            echo "- Ran CE2-08/09 and CE3-03/04/07 integration/spec drills (see artifact \`gateway-wal-hardening-drills\`)." >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f risk_perf_gate.json ]; then
            python - <<'PY' >> $GITHUB_STEP_SUMMARY
            import json
            from pathlib import Path
            payload = json.loads(Path("risk_perf_gate.json").read_text())
            r = payload.get("results", {})
            print("")
            print("### Risk/Gateway Heavy Drill (JSON Artifact)")
            for key in [
                "gateway_process_envelope_obj_us_per_call",
                "gateway_process_envelope_typed_us_per_call",
                "risk_gateway_typed_vs_obj_ratio",
                "risk_create_command_from_typed_us_per_call",
                "risk_evaluate_typed_frame_us_per_call",
            ]:
                if key in r:
                    print(f"- `{key}`: {r[key]:.4f}")
            fails = payload.get("failures", [])
            print(f"- `failures`: {len(fails)}")
            PY
          fi
          if [ -f feature_perf_gate.json ]; then
            python - <<'PY' >> $GITHUB_STEP_SUMMARY
            import json
            from pathlib import Path
            payload = json.loads(Path("feature_perf_gate.json").read_text())
            r = payload.get("results", {})
            print("")
            print("### Feature Plane Rust Drill (JSON Artifact)")
            for key in [
                "feature_engine_lob_update_us_per_event",
                "feature_engine_lob_update_rust_us_per_event",
                "feature_engine_python_vs_rust_parity_mismatch_rate",
                "feature_engine_parity_mismatch_rate",
            ]:
                if key in r:
                    print(f"- `{key}`: {r[key]:.6f}")
            fails = payload.get("failures", [])
            print(f"- `failures`: {len(fails)}")
            PY
          fi
          if [ -f research_feature_benchmark_matrix.json ]; then
            python - <<'PY' >> $GITHUB_STEP_SUMMARY
            import json
            from pathlib import Path
            payload = json.loads(Path("research_feature_benchmark_matrix.json").read_text())
            print("")
            print("### Research Wrapper Matrix (Artifact)")
            for name, result in payload.items():
                rc = result.get("returncode")
                j = result.get("json") or {}
                failures = (j.get("failures") or []) if isinstance(j, dict) else []
                print(f"- `{name}`: returncode={rc}, failures={len(failures)}")
            PY
          fi
          if [ -f diagnostics_timeline.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Diagnostics Timeline Artifact" >> $GITHUB_STEP_SUMMARY
            echo "- Generated synthetic incident timeline smoke artifacts (\`diagnostics_timeline.json\`, \`diagnostics_timeline.md\`)." >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # Stage 6: Security Scanning
  # ============================================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-python-uv

      - name: Run pip-audit
        run: make security-audit

      - name: Code security scan (bandit)
        run: uv run bandit -r src/hft_platform/ -c pyproject.toml -ll -q

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: License compliance check
        run: uv run pip-licenses --format=markdown --fail-on-licenses="GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later" || true
        continue-on-error: true

      - name: Security Summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ -f audit-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat audit-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # Stage 7: PR Review Gate (PRs only)
  # ============================================================================
  pr-review-gate:
    name: PR Design Review Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check HFT design review for feat/perf PRs
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only enforce for feat: and perf: PRs
          if echo "$PR_TITLE" | grep -qiE '^(feat|perf)(\(.+\))?:'; then
            echo "feat/perf PR detected — checking design review sections..."
            # Fetch body via gh CLI to avoid multiline env var escaping issues
            PR_BODY="$(gh pr view "$PR_NUMBER" --json body --jq '.body')"
            MISSING=0
            for section in "Allocation Audit" "Latency Budget" "Threading Model" "Data Layout" "Failure Mode"; do
              if printf '%s\n' "$PR_BODY" | grep -q "### $section"; then
                echo "  [OK] $section"
              else
                echo "  [MISSING] $section"
                MISSING=$((MISSING + 1))
              fi
            done
            if [ "$MISSING" -gt 0 ]; then
              echo ""
              echo "::error::PR is missing $MISSING HFT design review section(s)."
              echo "Please use the PR template and fill in all 5 review sections."
              exit 1
            fi
            echo "All design review sections present."
          else
            echo "Not a feat/perf PR — skipping design review check."
          fi
