name: CD — Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual deployment)"
        required: false
        default: false
        type: boolean
      rollback_sha:
        description: "Git SHA to rollback to (leave empty for normal deploy)"
        required: false
        default: ""
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/hft-engine

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Lowercase image name
        # OCI/GHCR repository names must be lowercase; github.repository
        # preserves the owner's case, so normalize before any docker ref.
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Determine staging SHA
        id: sha
        run: |
          if [ -n "${{ inputs.rollback_sha }}" ]; then
            echo "sha=${{ inputs.rollback_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_KEY: ${{ secrets.STAGING_KEY }}
          DEPLOY_SHA: ${{ steps.sha.outputs.sha }}
          DEPLOY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}
        run: |
          if [ -z "$STAGING_HOST" ]; then
            echo "::warning::Staging secrets not configured. Running local container smoke test."
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$STAGING_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=accept-new \
            "${STAGING_USER}@${STAGING_HOST}" \
            "cd /opt/hft-platform-staging && \
             docker pull ${DEPLOY_IMAGE} && \
             docker compose -f docker-compose.yml up -d --no-deps hft-engine && \
             sleep 10 && \
             curl -sf http://localhost:9090/metrics > /dev/null"

          rm -f ~/.ssh/staging_key

      - name: Staging health check
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_KEY: ${{ secrets.STAGING_KEY }}
        run: |
          if [ -z "$STAGING_HOST" ]; then
            echo "::warning::Staging secrets not configured. Skipping remote health check."
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$STAGING_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key

          for i in 1 2 3; do
            if ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=accept-new \
              "${STAGING_USER}@${STAGING_HOST}" \
              "curl -sf http://localhost:9090/metrics | grep -q hft_"; then
              echo "Staging health check passed (attempt $i)"
              rm -f ~/.ssh/staging_key
              exit 0
            fi
            echo "Staging health check attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "::error::Staging health check failed after 3 attempts"
          rm -f ~/.ssh/staging_key
          exit 1

      - name: Run soak daily report
        run: make soak-daily-report || echo "::warning::Soak report skipped (Prometheus not available in CI)"

  deploy:
    name: Build & Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    # Loop_v1 stabilization freeze: `production` is a GitHub environment with
    # required-reviewer protection. Auto-deploy on `workflow_run` cannot
    # bypass this gate; manual approval is required for every deploy.
    # Configure the rule server-side: Settings → Environments → production →
    # Required reviewers. See docs/loop_v1_stabilization_charter.md.
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/actions
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Lowercase image name
        # OCI/GHCR repository names must be lowercase; github.repository
        # preserves the owner's case, so normalize before any docker ref.
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Determine deploy SHA
        id: sha
        run: |
          if [ -n "${{ inputs.rollback_sha }}" ]; then
            echo "sha=${{ inputs.rollback_sha }}" >> "$GITHUB_OUTPUT"
            echo "mode=rollback" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "mode=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build and push Docker image
        if: inputs.dry_run != true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ steps.sha.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build only (dry run)
        if: inputs.dry_run == true
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}

      - name: Scan Docker image for vulnerabilities
        if: inputs.dry_run != true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}"
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"

      - name: Guard — check deploy secrets
        # `secrets` is not a valid context in step-level `if:` (the workflow
        # fails validation before any job starts), so this guard exports an
        # output the SSH steps key on instead.
        id: deploy_guard
        if: inputs.dry_run != true
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_KEY" ]; then
            echo "::warning::Deploy secrets not configured. Skipping SSH deploy."
            echo "Image pushed to: $DEPLOY_IMAGE"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to production host
        if: inputs.dry_run != true && steps.deploy_guard.outputs.configured == 'true'
        uses: ./.github/actions/ssh-deploy
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          remote-host: "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          command: >-
            cd /opt/hft-platform &&
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }} &&
            docker compose -f docker-compose.yml up -d --no-deps hft-engine &&
            sleep 5 &&
            curl -sf http://localhost:9090/metrics > /dev/null

      - name: Health check
        if: inputs.dry_run != true && steps.deploy_guard.outputs.configured == 'true'
        uses: ./.github/actions/ssh-deploy
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          remote-host: "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          command: >-
            for i in 1 2 3; do
            curl -sf http://localhost:9090/metrics | grep -q hft_ && echo "Health check passed (attempt $i)" && exit 0;
            echo "Health check attempt $i failed, retrying in 10s...";
            sleep 10;
            done;
            echo "::error::Health check failed after 3 attempts" && exit 1

      - name: Rollback on failure
        if: failure() && inputs.dry_run != true && steps.deploy_guard.outputs.configured == 'true'
        uses: ./.github/actions/ssh-deploy
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          remote-host: "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          command: >-
            cd /opt/hft-platform &&
            docker compose -f docker-compose.yml up -d --no-deps hft-engine &&
            sleep 5 &&
            curl -sf http://localhost:9090/metrics > /dev/null || true

      - name: Deploy Summary
        if: always()
        run: |
          echo "## CD Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: ${{ steps.sha.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: \`${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run**: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
