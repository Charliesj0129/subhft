name: Semgrep

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep governance rules
        run: semgrep scan --config semgrep --metrics=off --sarif --output semgrep.sarif

      - name: Upload SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
