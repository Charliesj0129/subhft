name: PR Review Checklist

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/**'
  merge_group:

permissions:
  pull-requests: read
  contents: read

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Merge queue compatibility
        if: github.event_name == 'merge_group'
        run: echo "merge_group validation uses PR-time governance checks; returning success for queue compatibility."

      - name: Check PR template governance sections
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_BODY="$(gh pr view "$PR_NUMBER" --json body --jq '.body')"
          for section in "## Summary" "## Test Plan" "## AI Participation"; do
            if ! printf '%s\n' "$PR_BODY" | grep -Fq "$section"; then
              echo "::error::Missing required PR section: $section"
              exit 1
            fi
          done

      # print() and float detection consolidated into ci.yml

      # Secret scanning moved to ci.yml security job (gitleaks)

      - name: Check TODO/FIXME without ticket reference
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking for TODO/FIXME without ticket references..."
          FOUND=$(grep -rnE '(TODO|FIXME|HACK|XXX)' src/ --include='*.py' \
            | grep -v '#[0-9]' \
            | grep -v 'TICKET' \
            | grep -v 'ISSUE' || true)
          if [ -n "$FOUND" ]; then
            echo "::warning::TODO/FIXME without ticket reference:"
            echo "$FOUND"
            echo ""
            echo "Consider linking TODOs to issue tracker tickets."
          fi
