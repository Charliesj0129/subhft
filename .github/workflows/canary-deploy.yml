name: Canary Deploy

on:
  push:
    branches: [main]

jobs:
  canary-evaluate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: ./.github/actions/setup-python-uv

      - name: Evaluate canary promotion
        run: |
          uv run python scripts/auto_release_orchestrator.py --project-root . --dry-run
