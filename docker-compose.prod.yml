# Production RESOURCE overrides for HFT platform
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Purpose: Resource tuning + production-specific environment config
# - CPU/memory limits (configurable via HFT_CPU_LIMIT / HFT_MEM_LIMIT env vars)
# - Production alertmanager config
# - Rust fused paths remain disabled until parity gate passes (tracked in docs/TODO.md)
#
# NOTE: For SECURITY hardening (read_only, network isolation, port binding),
#       see docker-compose.production.yml instead.
# Full production: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.production.yml up -d

services:
  hft-engine:
    environment:
      - HFT_FUSED_NORMALIZER=${HFT_FUSED_NORMALIZER:-0}
      - HFT_FEATURE_ENGINE_BACKEND=${HFT_FEATURE_ENGINE_BACKEND:-python}
    deploy:
      resources:
        limits:
          cpus: '${HFT_CPU_LIMIT:-2.0}'
          memory: ${HFT_MEM_LIMIT:-4096M}

  alertmanager:
    volumes:
      - ${HFT_ALERTMANAGER_CONFIG:-./config/monitoring/alerts/alertmanager.production.yml}:/etc/alertmanager/alertmanager.yml:ro
