# Production Risk Configuration
# Scope: TXFD6 (Mini-TAIEX futures) — conservative first-launch limits
#
# Mini-TAIEX: 1 point = 10 NTD
# All monetary values in NTD unless otherwise noted.
# All prices use scaled int (x10000).

global_limits:
  # Maximum position across all symbols
  max_position_lots: 2
  # Maximum single order size
  max_order_size: 1
  # Daily loss limit in NTD — triggers StormGuard HALT
  daily_loss_limit: 50000
  # Maximum notional exposure per symbol (NTD)
  max_notional_per_symbol: 500000
  # Maximum total notional exposure (NTD)
  max_total_notional: 1000000

symbol_limits:
  TXFD6:
    max_position_lots: 2
    max_order_size: 1
    max_notional: 500000
    # Tick size for Mini-TAIEX futures: 1 point
    tick_size_scaled: 10000  # 1 point x10000

stormguard:
  # StormGuard FSM thresholds (NTD)
  degrade_threshold: 30000
  halt_threshold: 50000
  # Recovery requires manual intervention in production
  auto_recover: false

rate_limiter:
  # Orders per second limit
  max_orders_per_second: 5
  # Orders per minute limit
  max_orders_per_minute: 60
  # Burst allowance
  burst_size: 3

circuit_breaker:
  # Consecutive reject count to trigger circuit breaker
  consecutive_reject_limit: 5
  # Cool-down period in seconds after circuit breaker trips
  cooldown_seconds: 60
  # Error rate threshold (fraction)
  error_rate_threshold: 0.10
  # Window for error rate calculation in seconds
  error_rate_window_seconds: 300

position_reconciliation:
  # Reconcile positions with broker every N seconds
  interval_seconds: 30
  # Maximum allowed position divergence before alert
  max_divergence_lots: 1
  # Halt trading if divergence exceeds this
  halt_on_divergence: true
