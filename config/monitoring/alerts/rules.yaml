groups:
- name: HFT_Critical
  rules:
  # Feed Health
  - alert: FeedGapCritical
    expr: rate(feed_events_total[30s]) == 0
    for: 5s
    labels:
        severity: critical
    annotations:
        summary: "Market Data Gap Detected"
        description: "No feed events for >5s during uptime."

  - alert: FeedReconnectTimeoutDetected
    expr: increase(feed_reconnect_timeout_total[5m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Feed reconnect timeout detected"
        description: "Reconnect timed out at least once in the last 5m."

  - alert: FeedReconnectExceptionDetected
    expr: increase(feed_reconnect_exception_total[5m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Feed reconnect exception detected"
        description: "Reconnect raised exception at least once in the last 5m."

  - alert: FeedReconnectFailureRatioHigh
    expr: |
      (
        (sum(increase(feed_reconnect_total{result=~"fail|exception"}[1h])) or vector(0))
        /
        clamp_min((sum(increase(feed_reconnect_total{result=~"ok|fail|exception"}[1h])) or vector(0)), 1)
      ) > 0.2
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "Feed reconnect failure ratio high"
        description: "Reconnect fail+exception ratio exceeded 20% over the last 1h."

  - alert: QuoteWatchdogCallbackReregisterHigh
    expr: increase(quote_watchdog_recovery_attempts_total{action="callback_reregister"}[1h]) > 10
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "Quote watchdog callback re-register spikes"
        description: "No quote data callback re-register attempts exceeded threshold in the last 1h."

  - alert: ShioajiWatchdogThreadDown
    expr: max_over_time(shioaji_thread_alive{thread="quote_watchdog"}[5m]) < 1
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Shioaji quote watchdog thread down"
        description: "quote_watchdog liveness gauge has been 0 for >1m."

  - alert: ShioajiPendingQuoteStall
    expr: shioaji_quote_pending_age_seconds > 300
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: "Shioaji pending quote state stalled"
        description: "pending_quote_resubscribe age > 300s for more than 5m."

  - alert: ShioajiLoginFailuresDetected
    expr: increase(shioaji_login_fail_total[10m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Shioaji login failures detected"
        description: "Login attempts exhausted retries in the last 10m."

  - alert: ShioajiCrashSignatureDetected
    expr: increase(shioaji_crash_signature_total[10m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Shioaji crash precursor signature detected"
        description: "Detected known crash signature {{ $labels.signature }} in {{ $labels.context }} path in the last 10m."

  - alert: FeedSessionConflictDetected
    expr: increase(feed_session_conflict_total[10m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Feed session ownership conflict detected"
        description: "Another runtime owner was detected for Redis feed session lease in the last 10m."

  - alert: ShioajiSessionLockConflictDetected
    expr: increase(shioaji_session_lock_conflicts_total[10m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Shioaji session lock conflict detected"
        description: "Potential multi-runtime broker session lock conflict detected in the last 10m."

  - alert: BusOverflowCritical
    expr: increase(bus_overflow_total[1m]) > 0
    for: 1s
    labels:
        severity: critical
    annotations:
        summary: "Event Bus Overflow"
        description: "Events dropped due to full ring buffer."

  # Risk
  - alert: StormGuardHalt
    expr: stormguard_mode == 3
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "StormGuard HALT Triggered"
        description: "Strategy {{ $labels.strategy }} hit HALT threshold."

  - alert: HighRejectRate
    expr: rate(order_reject_total[1m]) / (rate(order_actions_total[1m]) + 1) > 0.1
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "High Order Reject Rate"
        description: "Reject rate > 10%."

  # Execution Health
  - alert: ExecutionLagHigh
    expr: histogram_quantile(0.99, sum(rate(execution_router_lag_ns_bucket[30s])) by (le)) > 1e7
    for: 30s
    labels:
        severity: warning
    annotations:
        summary: "Execution Lag High"
        description: "P99 execution report lag > 10ms."

  - alert: QueueDepthSpike
    expr: max_over_time(queue_depth[30s]) > 1000
    for: 30s
    labels:
        severity: warning
    annotations:
        summary: "Queue Depth Spike"
        description: "Queue depth exceeded 1000 in the last 30s."

  - alert: ExecutionGatewayTaskDown
    expr: max_over_time(execution_gateway_alive[2m]) < 1
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Execution gateway task down"
        description: "execution_gateway_alive has been 0 for more than 1 minute."

  - alert: ExecutionRouterTaskDown
    expr: max_over_time(execution_router_alive[2m]) < 1
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Execution router task down"
        description: "execution_router_alive has been 0 for more than 1 minute."

  - alert: RawQueueDropsDetected
    expr: increase(raw_queue_dropped_total[5m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Raw queue drops detected"
        description: "Market data callback queue dropped payloads in the last 5m."

  - alert: ShioajiCallbackIngressLatencyP99High
    expr: histogram_quantile(0.99, sum(rate(shioaji_quote_callback_ingress_latency_ns_bucket[5m])) by (le)) > 1e5
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Shioaji callback ingress latency high"
        description: "Callback ingress latency p99 exceeded 100us for 2m."

  - alert: CallbackParseMissDetected
    expr: increase(market_data_callback_parse_total{result="miss"}[10m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Callback parser miss detected"
        description: "market_data callback parser miss increased in the last 10m."

  # Infra
  - alert: RecorderFailure
    expr: increase(recorder_failures_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Recorder Write Failed"
        description: "ClickHouse ingestion failing."

  - alert: RecorderInsertFailedRatioHigh
    expr: |
      (
        (sum(increase(recorder_insert_batches_total{result=~"failed_after_retry|failed_no_client"}[24h])) or vector(0))
        /
        clamp_min((sum(increase(recorder_insert_batches_total{result=~"success_no_retry|success_after_retry|failed_after_retry|failed_no_client"}[24h])) or vector(0)), 1)
      ) > 0.005
    for: 15m
    labels:
        severity: warning
    annotations:
        summary: "Recorder insert failed ratio high"
        description: "24h insert failed ratio exceeded 0.5% SLO."

  - alert: RecorderInsertRetryRatioHigh
    expr: |
      (
        (sum(increase(recorder_insert_batches_total{result=~"success_after_retry|failed_after_retry"}[24h])) or vector(0))
        /
        clamp_min((sum(increase(recorder_insert_batches_total{result=~"success_no_retry|success_after_retry|failed_after_retry|failed_no_client"}[24h])) or vector(0)), 1)
      ) > 0.05
    for: 15m
    labels:
        severity: warning
    annotations:
        summary: "Recorder insert retry ratio high"
        description: "24h insert retry ratio exceeded 5% guardrail."

  # CE-M2 Gateway SLO / schema guard
  - alert: GatewayDispatchLatencyP99High
    expr: histogram_quantile(0.99, sum(rate(gateway_dispatch_latency_ns_bucket[5m])) by (le)) > 2e6
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Gateway dispatch latency high"
        description: "Gateway dispatch latency p99 > 2ms for 2m."

  - alert: GatewayIntentChannelDepthHigh
    expr: max_over_time(gateway_intent_channel_depth[5m]) > 500
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "Gateway intent channel depth high"
        description: "Gateway intent queue depth exceeded 500."

  - alert: QuoteSchemaMismatchDetected
    expr: increase(quote_schema_mismatch_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Quote schema mismatch rejected"
        description: "Shioaji callback payload failed quote schema guard."

  # Feature Plane canary / parity SLO
  - alert: FeatureShadowParityMismatchDetected
    expr: increase(feature_shadow_parity_mismatch_total[10m]) > 0
    for: 2m
    labels:
        severity: critical
    annotations:
        summary: "Feature shadow parity mismatch detected"
        description: "Feature shadow parity mismatches occurred in the last 10m."

  - alert: FeaturePlaneLatencyP99High
    expr: histogram_quantile(0.99, sum(rate(feature_plane_latency_ns_bucket[5m])) by (le)) > 5e4
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: "Feature plane latency p99 high"
        description: "feature_plane_latency_ns p99 exceeded 50us for 5m."

  - alert: FeatureQualityFlagsSpike
    expr: sum(increase(feature_quality_flags_total{flag=~"gap|out_of_order|partial"}[10m])) > 0
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Feature quality flags spike"
        description: "Feature quality flags (gap/out_of_order/partial) increased in the last 10m."

  - alert: FeaturePlaneUpdateErrorRatioHigh
    expr: |
      (
        (sum(increase(feature_plane_updates_total{result="error"}[30m])) or vector(0))
        /
        clamp_min((sum(increase(feature_plane_updates_total{result=~"updated|emitted|error"}[30m])) or vector(0)), 1)
      ) > 0.01
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "Feature plane update error ratio high"
        description: "Feature update error ratio exceeded 1% over the last 30m."

  # Disk Space (Host)
  - alert: HostDiskSpaceCritical
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Root filesystem < 10% free"
        description: "Host {{ $labels.instance }} root partition has less than 10% disk space available."

  - alert: HostDiskSpaceWarn
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.20
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: "Root filesystem < 20% free"
        description: "Host {{ $labels.instance }} root partition approaching capacity (< 20% free)."

  - alert: ClickHouseSystemLogSizeCritical
    expr: |
      sum by (table) (
        clickhouse_table_parts_bytes{database="system", table=~"trace_log|text_log|part_log|query_log"}
      ) > 10 * 1024 * 1024 * 1024
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "ClickHouse system log table > 10 GB"
        description: "system.{{ $labels.table }} has exceeded 10 GB. TTL may not be running. Consider TRUNCATE."

  # CE-M3 WAL SLO
  - alert: WALReplayLagHigh
    expr: wal_replay_lag_seconds > 600
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL replay lag high"
        description: "Oldest pending WAL file age > 600s."

  - alert: WALBacklogFilesHigh
    expr: wal_backlog_files > 200
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL backlog file count high"
        description: "Pending WAL files exceed 200."

  - alert: WALDrainETAHigh
    expr: wal_drain_eta_seconds > 900
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL drain ETA high"
        description: "Estimated WAL drain ETA exceeds 15 minutes."
