groups:
- name: HFT_Critical
  rules:
  # ── Target Health ───────────────────────────────────────────────
  - alert: HFTEngineDown
    expr: up{job="hft-engine"} == 0
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "HFT Engine scrape target is down"
      description: "hft-engine:9090 has been unreachable for >30s. The trading process may have crashed."

  # Feed Health
  - alert: FeedGapCritical
    expr: rate(feed_events_total[30s]) == 0 and market_trading_hours_active == 1
    for: 5s
    labels:
        severity: critical
    annotations:
        summary: "Market Data Gap Detected"
        description: "No feed events for >5s during uptime."
        runbook_url: "docs/runbooks/FeedGapCritical.md"

  - alert: FeedReconnectTimeoutDetected
    expr: increase(feed_reconnect_timeout_total[5m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Feed reconnect timeout detected"
        description: "Reconnect timed out at least once in the last 5m."

  - alert: FeedReconnectExceptionDetected
    expr: increase(feed_reconnect_exception_total[5m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Feed reconnect exception detected"
        description: "Reconnect raised exception at least once in the last 5m."

  - alert: SymbolConfigReloadFailed
    expr: increase(feed_symbol_config_reload_total{result!="ok"}[5m]) > 0
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Symbol reload preflight failed"
        description: |
          ShioajiClient._load_config() exited with result="{{ $labels.result }}"
          at least once in the last 5m. Symbol subscriptions are stale until
          the next successful reload (~25min cadence). RC-1 root cause:
          universe size > HFT_MAX_SUBSCRIPTIONS preflight ceiling. Check
          recent config/symbols.yaml diffs and ensure HFT_MAX_SUBSCRIPTIONS
          >= len(symbols).
        runbook_url: "docs/runbooks/SymbolConfigReloadFailed.md"

  - alert: FeedReconnectFailureRatioHigh
    expr: |
      (
        (sum(increase(feed_reconnect_total{result=~"fail|exception"}[1h])) or vector(0))
        /
        clamp_min((sum(increase(feed_reconnect_total{result=~"ok|fail|exception"}[1h])) or vector(0)), 1)
      ) > 0.2
      and on() market_trading_hours_active == 1
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "Feed reconnect failure ratio high"
        description: "Reconnect fail+exception ratio exceeded 20% over the last 1h."

  - alert: QuoteWatchdogCallbackReregisterHigh
    expr: increase(quote_watchdog_recovery_attempts_total{action="callback_reregister"}[1h]) > 10
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "Quote watchdog callback re-register spikes"
        description: "No quote data callback re-register attempts exceeded threshold in the last 1h."

  - alert: ShioajiWatchdogThreadDown
    expr: max_over_time(shioaji_thread_alive{thread="quote_watchdog"}[5m]) < 1 and market_trading_hours_active == 1
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Shioaji quote watchdog thread down"
        description: "quote_watchdog liveness gauge has been 0 for >1m."
        runbook_url: "docs/runbooks/ShioajiWatchdogThreadDown.md"

  - alert: ShioajiPendingQuoteStall
    expr: shioaji_quote_pending_age_seconds > 300
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: "Shioaji pending quote state stalled"
        description: "pending_quote_resubscribe age > 300s for more than 5m."

  - alert: ShioajiLoginFailuresDetected
    expr: increase(shioaji_login_fail_total[10m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Shioaji login failures detected"
        description: "Login attempts exhausted retries in the last 10m."

  - alert: ShioajiCrashSignatureDetected
    expr: increase(shioaji_crash_signature_total[10m]) > 0 and on() market_trading_hours_active == 1
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Shioaji crash precursor signature detected"
        description: "Detected known crash signature {{ $labels.signature }} in {{ $labels.context }} path in the last 10m."
        runbook_url: "docs/runbooks/ShioajiCrashSignatureDetected.md"

  - alert: FeedSessionConflictDetected
    expr: increase(feed_session_conflict_total[10m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Feed session ownership conflict detected"
        description: "Another runtime owner was detected for Redis feed session lease in the last 10m."

  - alert: ShioajiSessionLockConflictDetected
    expr: increase(shioaji_session_lock_conflicts_total[10m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Shioaji session lock conflict detected"
        description: "Potential multi-runtime broker session lock conflict detected in the last 10m."

  - alert: BusOverflowCritical
    expr: increase(bus_overflow_total[1m]) > 0
    for: 1s
    labels:
        severity: critical
    annotations:
        summary: "Event Bus Overflow"
        description: "Events dropped due to full ring buffer."

  # Risk
  - alert: StormGuardHalt
    expr: stormguard_mode == 3
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "StormGuard HALT Triggered"
        description: "Strategy {{ $labels.strategy }} hit HALT threshold."
        runbook_url: "docs/runbooks/StormGuardHalt.md"

  - alert: StormGuardHaltStuck
    expr: stormguard_mode == 3
    for: 5m
    labels:
        severity: critical
    annotations:
        summary: "StormGuard stuck in HALT for >5 minutes"
        description: "StormGuard has been in HALT state for over 5 minutes. Manual intervention may be required."
        runbook_url: "docs/runbooks/StormGuardHalt.md"

  - alert: HighRejectRate
    expr: rate(order_reject_total[1m]) / (rate(order_actions_total[1m]) + 1) > 0.1
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "High Order Reject Rate"
        description: "Reject rate > 10%."
        runbook_url: "docs/runbooks/HighRejectRate.md"

  # Execution Health
  - alert: ExecutionLagHigh
    expr: histogram_quantile(0.99, sum(rate(execution_router_lag_ns_bucket[30s])) by (le)) > 1e7
    for: 30s
    labels:
        severity: warning
    annotations:
        summary: "Execution Lag High"
        description: "P99 execution report lag > 10ms."

  - alert: QueueDepthSpike
    expr: max_over_time(queue_depth[30s]) > 1000
    for: 30s
    labels:
        severity: warning
    annotations:
        summary: "Queue Depth Spike"
        description: "Queue depth exceeded 1000 in the last 30s."

  - alert: ExecutionGatewayTaskDown
    expr: max_over_time(execution_gateway_alive[2m]) < 1
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Execution gateway task down"
        description: "execution_gateway_alive has been 0 for more than 1 minute."

  - alert: ExecutionRouterTaskDown
    expr: max_over_time(execution_router_alive[2m]) < 1
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Execution router task down"
        description: "execution_router_alive has been 0 for more than 1 minute."

  - alert: RawQueueDropsDetected
    expr: increase(raw_queue_dropped_total[5m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Raw queue drops detected"
        description: "Market data callback queue dropped payloads in the last 5m."

  - alert: ShioajiCallbackIngressLatencyP99High
    expr: histogram_quantile(0.99, sum(rate(shioaji_quote_callback_ingress_latency_ns_bucket[5m])) by (le)) > 1e5
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Shioaji callback ingress latency high"
        description: "Callback ingress latency p99 exceeded 100us for 2m."

  - alert: CallbackParseMissDetected
    expr: increase(market_data_callback_parse_total{result="miss"}[10m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Callback parser miss detected"
        description: "market_data callback parser miss increased in the last 10m."

  # Infra
  - alert: RecorderFailure
    expr: increase(recorder_failures_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Recorder Write Failed"
        description: "ClickHouse ingestion failing."
        runbook_url: "docs/runbooks/RecorderFailure.md"

  - alert: RecorderInsertFailedRatioHigh
    expr: |
      (
        (sum(increase(recorder_insert_batches_total{result=~"failed_after_retry|failed_no_client"}[24h])) or vector(0))
        /
        clamp_min((sum(increase(recorder_insert_batches_total{result=~"success_no_retry|success_after_retry|failed_after_retry|failed_no_client"}[24h])) or vector(0)), 1)
      ) > 0.005
    for: 15m
    labels:
        severity: warning
    annotations:
        summary: "Recorder insert failed ratio high"
        description: "24h insert failed ratio exceeded 0.5% SLO."

  - alert: RecorderInsertRetryRatioHigh
    expr: |
      (
        (sum(increase(recorder_insert_batches_total{result=~"success_after_retry|failed_after_retry"}[24h])) or vector(0))
        /
        clamp_min((sum(increase(recorder_insert_batches_total{result=~"success_no_retry|success_after_retry|failed_after_retry|failed_no_client"}[24h])) or vector(0)), 1)
      ) > 0.05
    for: 15m
    labels:
        severity: warning
    annotations:
        summary: "Recorder insert retry ratio high"
        description: "24h insert retry ratio exceeded 5% guardrail."

  # CE-M2 Gateway SLO / schema guard
  - alert: GatewayDispatchLatencyP99High
    expr: histogram_quantile(0.99, sum(rate(gateway_dispatch_latency_ns_bucket[5m])) by (le)) > 2e6
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Gateway dispatch latency high"
        description: "Gateway dispatch latency p99 > 2ms for 2m."

  - alert: GatewayIntentChannelDepthHigh
    expr: max_over_time(gateway_intent_channel_depth[5m]) > 500
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "Gateway intent channel depth high"
        description: "Gateway intent queue depth exceeded 500."

  - alert: QuoteSchemaMismatchDetected
    expr: increase(quote_schema_mismatch_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Quote schema mismatch rejected"
        description: "Shioaji callback payload failed quote schema guard."

  # Feature Plane canary / parity SLO
  - alert: FeatureShadowParityMismatchDetected
    expr: increase(feature_shadow_parity_mismatch_total[10m]) > 0
    for: 2m
    labels:
        severity: critical
    annotations:
        summary: "Feature shadow parity mismatch detected"
        description: "Feature shadow parity mismatches occurred in the last 10m."

  # Threshold calibrated 2026-04-25 against measured baseline on the WSL+Docker
  # deploy target: P50=77us, P95=154us, P99=191us. The original 50us threshold
  # was below P50 and fired continuously. 500us is ~2.5x current P99 — tight
  # enough to catch a real regression, loose enough to ride normal variance.
  # Revisit if the deploy hardware changes (bare metal would cut these by ~3x).
  - alert: FeaturePlaneLatencyP99High
    expr: histogram_quantile(0.99, sum(rate(feature_plane_latency_ns_bucket[5m])) by (le)) > 5e5
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: "Feature plane latency p99 high"
        description: "feature_plane_latency_ns p99 exceeded 500us for 5m."

  - alert: FeatureQualityFlagsSpike
    expr: sum(increase(feature_quality_flags_total{flag=~"gap|state_reset|out_of_order"}[10m])) > 0
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Feature quality flags spike"
        description: "Corrupt feature quality flags (gap/state_reset/out_of_order) increased in the last 10m."

  - alert: FeaturePlaneUpdateErrorRatioHigh
    expr: |
      (
        (sum(increase(feature_plane_updates_total{result="error"}[30m])) or vector(0))
        /
        clamp_min((sum(increase(feature_plane_updates_total{result=~"updated|emitted|error"}[30m])) or vector(0)), 1)
      ) > 0.01
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "Feature plane update error ratio high"
        description: "Feature update error ratio exceeded 1% over the last 30m."

  # Disk Space (Host)
  - alert: HostDiskSpaceCritical
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Root filesystem < 10% free"
        description: "Host {{ $labels.instance }} root partition has less than 10% disk space available."
        runbook_url: "docs/runbooks/HostDiskSpaceCritical.md"

  - alert: HostDiskSpaceWarn
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.20
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: "Root filesystem < 20% free"
        description: "Host {{ $labels.instance }} root partition approaching capacity (< 20% free)."

  - alert: ClickHouseSystemLogSizeCritical
    expr: |
      sum by (table) (
        clickhouse_table_parts_bytes{database="system", table=~"trace_log|text_log|part_log|query_log"}
      ) > 10 * 1024 * 1024 * 1024
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "ClickHouse system log table > 10 GB"
        description: "system.{{ $labels.table }} has exceeded 10 GB. TTL may not be running. Consider TRUNCATE."

  # Reconciliation / Execution Router Health
  - alert: ReconciliationDiscrepancyDetected
    expr: reconciliation_discrepancy_count > 0
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Reconciliation discrepancy detected"
        description: "reconciliation_discrepancy_count has been > 0 for more than 1 minute; position state may diverge from broker."

  - alert: ExecutionRouterHeartbeatStale
    expr: time() - execution_router_heartbeat_ts > 120
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Execution router heartbeat stale"
        description: "Execution router heartbeat has not been updated for > 120s; router may be hung or crashed."

  - alert: ExecutionRouterLagP99High
    expr: histogram_quantile(0.99, sum(rate(execution_router_lag_ns_bucket[1m])) by (le)) > 5e7
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "Execution router lag p99 high"
        description: "Execution router lag p99 exceeded 50ms for 1m."

  # CE-M3 WAL SLO
  - alert: WALReplayLagHigh
    expr: wal_replay_lag_seconds > 600
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL replay lag high"
        description: "Oldest pending WAL file age > 600s."

  - alert: WALBacklogFilesHigh
    expr: wal_backlog_files > 200
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL backlog file count high"
        description: "Pending WAL files exceed 200."

  - alert: WALDrainETAHigh
    expr: wal_drain_eta_seconds > 900
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL drain ETA high"
        description: "Estimated WAL drain ETA exceeds 15 minutes."

  # ClickHouse connection health
  - alert: ClickHouseConnectionDown
    expr: clickhouse_connection_health == 0
    for: 2m
    labels:
        severity: critical
    annotations:
        summary: "ClickHouse connection down"
        description: "ClickHouse heartbeat failed for >2m. Engine may be falling back to WAL-only writes."
        runbook_url: "docs/runbooks/ClickHouseConnectionDown.md"

  # WAL disk pressure
  - alert: WALDiskPressureCritical
    expr: disk_pressure_level >= 2
    for: 30s
    labels:
        severity: critical
    annotations:
        summary: "WAL disk pressure critical"
        description: "WAL disk pressure at CRITICAL or HALT level. Data may be dropped."
        runbook_url: "docs/runbooks/WALDiskPressureCritical.md"

  # Pipeline dual-fault (CH + WAL both failed)
  - alert: PipelineDataLoss
    expr: pipeline_health_state >= 3
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Recorder pipeline DATA_LOSS — both ClickHouse and WAL failed"
        description: "pipeline_health_state has reached DATA_LOSS (3). Market data is being dropped with no persistence path available."

  # Recorder reinject circuit breaker — permanent data loss
  - alert: RecorderReinjectCircuitBreakerOpen
    expr: increase(recorder_reinject_circuit_breaker_drops_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Recorder reinject circuit breaker open — PERMANENT DATA LOSS"
        description: "Both ClickHouse and WAL have failed repeatedly. Rows are being permanently dropped."

  # Execution recording drops
  - alert: RecorderExecDropsDetected
    expr: increase(recorder_exec_drops_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Execution event recording drops detected"
        description: "Fill/order events are being dropped from the recorder queue."

  # Execution WAL fallback failure
  - alert: RecorderExecWalFallbackFailure
    expr: increase(recorder_exec_wal_fallback_failure_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Execution WAL fallback failure — data loss risk"
        description: "WAL fallback for execution events has failed."

  # Fill data loss
  - alert: ExecFillDataLossDetected
    expr: increase(exec_fill_data_loss[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Fill data loss detected"
        description: "Fill events have been permanently lost."

  # Schema initialization failure (WAL-only degraded mode)
  - alert: RecorderSchemaInitFailed
    expr: recorder_schema_init_failed == 1
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Recorder schema initialization failed — WAL-only mode"
        description: "ClickHouse schema migration failed at startup. All data is going to WAL with no ClickHouse persistence path."

  # Event loop lag
  - alert: EventLoopLagHigh
    expr: event_loop_lag_ms > 5
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "Event loop lag high"
        description: "asyncio event loop lag > 5ms for 1 minute. Hot path latency degraded."

  # Strategy exceptions
  - alert: StrategyExceptionsRateHigh
    expr: rate(strategy_exceptions_total[5m]) > 0.1
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Strategy exceptions rate high"
        description: "Strategy exception rate > 0.1/s for 2 minutes."

  # Portfolio drawdown
  - alert: PortfolioDrawdownHigh
    expr: portfolio_drawdown_pct > 0.05
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "Portfolio drawdown > 5%"
        description: "Portfolio has drawn down more than 5% from peak realized PnL."

  - alert: PortfolioDrawdownCritical
    expr: portfolio_drawdown_pct > 0.10
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Portfolio drawdown > 10%"
        description: "Portfolio drawdown exceeded 10%. StormGuard should be in HALT."

  # Redis health monitoring removed 2026-04-24 — engine does not probe Redis
  # (no `redis` Python module in engine container; only the separate monitor
  # container uses Redis). The `redis_connection_health` gauge had no setter,
  # so this alert fired continuously on a default-0 gauge. Re-introduce at the
  # component that actually probes Redis (monitor) when needed.

  - alert: OrphanedFillDetected
    expr: increase(orphaned_fill_total[5m]) > 0
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: Orphaned fills detected
        runbook_url: docs/runbooks/OrphanedFillDetected.md
  - alert: SLOFeedAvailabilityBurnRateHigh
    expr: 1 - slo:feed_availability:ratio_rate5m > 0.01
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: Feed availability SLO burn rate high
  - alert: SLOOrderSuccessRateLow
    expr: slo:order_success:ratio_rate5m < 0.995
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: Order success rate below SLO

  # Loki Health
  - alert: LokiDown
    expr: up{job="loki"} == 0
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Loki log aggregation is down"
        description: "Loki has been unreachable for >2 minutes. Log search unavailable."

  # ── Backup Health ─────────────────────────────────────────────
  # `hft_backup_last_success_ts > 0` gate (2026-04-25): the cron-driven backup
  # runs as a one-shot `docker compose exec hft-engine python -c ...` subprocess.
  # Its MetricsRegistry.get() returns a fresh registry in that subprocess and
  # is not the engine's scrape target, so the gauge never leaves 0 even though
  # backups have succeeded daily (see /tmp/hft_backup.log on prod). Without the
  # gate, `0 < time() - 172800` is always true and BackupStale fires forever.
  # TODO(ops): structural fix — either Pushgateway, node_exporter textfile
  # collector, or have the engine stat $BACKUP_DIR mtime periodically and
  # update the gauge. Until then this gate disables the alert; monitor backup
  # health via /tmp/hft_backup.log tailing.
  - alert: BackupStale
    expr: hft_backup_last_success_ts < (time() - 172800) and hft_backup_last_success_ts > 0
    for: 1h
    labels:
        severity: critical
    annotations:
        summary: ClickHouse backup is stale (>2 days since last success)
        description: "Last successful backup was {{ $value | humanizeTimestamp }}. Check cron and backup disk."

  # ── Fill Loss (M-07) ─────────────────────────────────────────
  - alert: FillEvictionDetected
    expr: rate(exec_overflow_evicted_total[5m]) > 0
    for: 0s
    labels:
      severity: critical
    annotations:
      summary: "Fill events are being evicted (data loss)"
      description: "exec_overflow_evicted_total is increasing. Fill events are being silently dropped."

  # ── Alpha Signal Silence (M-09) ──────────────────────────────
  # `alpha_last_signal_ts > 0` gate prevents false positives for strategies that
  # are registered (executor entry built by StrategyRunner) but have never
  # emitted an intent — e.g. config-disabled strategies. Without the gate,
  # `time() - 0` always exceeds 300 and the alert fires forever at startup.
  # Use all alpha decision outcomes for liveness: a strategy can be healthy while
  # emitting only flat decisions, so non-flat timestamp age alone is not silence.
  - alert: AlphaSignalSilent
    expr: |
      (sum by (strategy) (increase(alpha_signal_events_total[5m])) == 0)
      and on(strategy) alpha_last_signal_ts > 0
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "No alpha decisions for >5 minutes"
      description: "No intent or flat alpha decisions were observed for >5 minutes after the strategy had previously emitted an intent. Alpha pipeline may be stalled."

  # ── Autonomy Control-Plane (M-10) ────────────────────────────
  - alert: StrategyQuarantineActive
    expr: strategy_quarantine_active == 1
    for: 0s
    labels:
      severity: critical
    annotations:
      summary: "Strategy quarantine is active"
      description: "A strategy has been quarantined. Manual review required."

  - alert: PlatformReduceOnlyActive
    expr: platform_reduce_only_active == 1
    for: 0s
    labels:
      severity: critical
    annotations:
      summary: "Platform is in reduce-only mode"
      description: "New positions are blocked. Only position reduction is allowed."

  - alert: ManualRearmRequired
    expr: manual_rearm_required == 1
    for: 0s
    labels:
      severity: critical
    annotations:
      summary: "Manual rearm required"
      description: "Platform requires manual intervention to resume normal operations."

  - alert: AutonomyStateTransition
    expr: increase(autonomy_transitions_total[5m]) > 0
    for: 0s
    labels:
      severity: warning
    annotations:
      summary: "Autonomy state transition detected"
      description: "The autonomy control-plane changed state. Check current mode."

  # ── Gateway Heartbeat (M-11) ─────────────────────────────────
  - alert: ExecutionGatewayHeartbeatStale
    expr: (time() - execution_gateway_heartbeat_ts) > 60
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "Execution Gateway heartbeat is stale (>60s)"
      description: "execution_gateway_heartbeat_ts has not been updated in >60 seconds."

  # ── WAL Integrity (M-12) ─────────────────────────────────────
  - alert: WALCorruptionDetected
    expr: increase(wal_corrupt_files_total[1h]) > 0
    for: 0s
    labels:
      severity: critical
    annotations:
      summary: "Corrupt WAL files detected"
      description: "{{ $value }} corrupt WAL file(s) quarantined in the last hour."

  - alert: WALReplayErrorsDetected
    expr: increase(wal_replay_errors_total[1h]) > 0
    for: 0s
    labels:
      severity: warning
    annotations:
      summary: "WAL replay errors detected"
      description: "{{ $value }} WAL replay error(s) in the last hour."

  # ── ClickHouse Pool (M-13) ───────────────────────────────────
  # DISABLED: clickhouse_pool_timeout_total is registered but never incremented.
  # Re-enable when writer.py semaphore acquisition is instrumented.
