groups:
- name: HFT_Critical
  rules:
  # Feed Health
  - alert: FeedGapCritical
    expr: rate(feed_events_total[30s]) == 0
    for: 5s
    labels:
        severity: critical
    annotations:
        summary: "Market Data Gap Detected"
        description: "No feed events for >5s during uptime."

  - alert: FeedReconnectTimeoutDetected
    expr: increase(feed_reconnect_timeout_total[5m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Feed reconnect timeout detected"
        description: "Reconnect timed out at least once in the last 5m."

  - alert: FeedReconnectExceptionDetected
    expr: increase(feed_reconnect_exception_total[5m]) > 0
    for: 0s
    labels:
        severity: warning
    annotations:
        summary: "Feed reconnect exception detected"
        description: "Reconnect raised exception at least once in the last 5m."

  - alert: ShioajiWatchdogThreadDown
    expr: max_over_time(shioaji_thread_alive{thread="quote_watchdog"}[5m]) < 1
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Shioaji quote watchdog thread down"
        description: "quote_watchdog liveness gauge has been 0 for >1m."

  - alert: ShioajiPendingQuoteStall
    expr: shioaji_quote_pending_age_seconds > 300
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: "Shioaji pending quote state stalled"
        description: "pending_quote_resubscribe age > 300s for more than 5m."

  - alert: BusOverflowCritical
    expr: increase(bus_overflow_total[1m]) > 0
    for: 1s
    labels:
        severity: critical
    annotations:
        summary: "Event Bus Overflow"
        description: "Events dropped due to full ring buffer."

  # Risk
  - alert: StormGuardHalt
    expr: stormguard_mode == 3
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "StormGuard HALT Triggered"
        description: "Strategy {{ $labels.strategy }} hit HALT threshold."

  - alert: HighRejectRate
    expr: rate(order_reject_total[1m]) / (rate(order_actions_total[1m]) + 1) > 0.1
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "High Order Reject Rate"
        description: "Reject rate > 10%."

  # Execution Health
  - alert: ExecutionLagHigh
    expr: histogram_quantile(0.99, sum(rate(execution_router_lag_ns_bucket[30s])) by (le)) > 1e7
    for: 30s
    labels:
        severity: warning
    annotations:
        summary: "Execution Lag High"
        description: "P99 execution report lag > 10ms."

  - alert: QueueDepthSpike
    expr: max_over_time(queue_depth[30s]) > 1000
    for: 30s
    labels:
        severity: warning
    annotations:
        summary: "Queue Depth Spike"
        description: "Queue depth exceeded 1000 in the last 30s."

  # Infra
  - alert: RecorderFailure
    expr: increase(recorder_failures_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Recorder Write Failed"
        description: "ClickHouse ingestion failing."

  # CE-M2 Gateway SLO / schema guard
  - alert: GatewayDispatchLatencyP99High
    expr: histogram_quantile(0.99, sum(rate(gateway_dispatch_latency_ns_bucket[5m])) by (le)) > 2e6
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "Gateway dispatch latency high"
        description: "Gateway dispatch latency p99 > 2ms for 2m."

  - alert: GatewayIntentChannelDepthHigh
    expr: max_over_time(gateway_intent_channel_depth[5m]) > 500
    for: 1m
    labels:
        severity: warning
    annotations:
        summary: "Gateway intent channel depth high"
        description: "Gateway intent queue depth exceeded 500."

  - alert: QuoteSchemaMismatchDetected
    expr: increase(quote_schema_mismatch_total[5m]) > 0
    for: 0s
    labels:
        severity: critical
    annotations:
        summary: "Quote schema mismatch rejected"
        description: "Shioaji callback payload failed quote schema guard."

  # Disk Space (Host)
  - alert: HostDiskSpaceCritical
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
    for: 1m
    labels:
        severity: critical
    annotations:
        summary: "Root filesystem < 10% free"
        description: "Host {{ $labels.instance }} root partition has less than 10% disk space available."

  - alert: HostDiskSpaceWarn
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.20
    for: 5m
    labels:
        severity: warning
    annotations:
        summary: "Root filesystem < 20% free"
        description: "Host {{ $labels.instance }} root partition approaching capacity (< 20% free)."

  - alert: ClickHouseSystemLogSizeCritical
    expr: |
      sum by (table) (
        clickhouse_table_parts_bytes{database="system", table=~"trace_log|text_log|part_log|query_log"}
      ) > 10 * 1024 * 1024 * 1024
    for: 10m
    labels:
        severity: warning
    annotations:
        summary: "ClickHouse system log table > 10 GB"
        description: "system.{{ $labels.table }} has exceeded 10 GB. TTL may not be running. Consider TRUNCATE."

  # CE-M3 WAL SLO
  - alert: WALReplayLagHigh
    expr: wal_replay_lag_seconds > 600
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL replay lag high"
        description: "Oldest pending WAL file age > 600s."

  - alert: WALBacklogFilesHigh
    expr: wal_backlog_files > 200
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL backlog file count high"
        description: "Pending WAL files exceed 200."

  - alert: WALDrainETAHigh
    expr: wal_drain_eta_seconds > 900
    for: 2m
    labels:
        severity: warning
    annotations:
        summary: "WAL drain ETA high"
        description: "Estimated WAL drain ETA exceeds 15 minutes."
