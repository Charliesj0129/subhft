global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity, symbol]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: telegram-bridge
  routes:
    - match:
        severity: critical
      receiver: telegram-bridge
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 15m
      continue: false

    - match:
        severity: warning
      receiver: telegram-bridge
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      continue: false

    - match:
        severity: info
      receiver: "null"
      continue: false

receivers:
  - name: telegram-bridge
    webhook_configs:
      - url: http://hft-engine:8081/webhook/alertmanager
        send_resolved: true

  - name: "null"

inhibit_rules:
  # Critical infra-down alerts suppress cascade warnings
  - source_matchers:
      - alertname = ClickHouseConnectionDown
    target_matchers:
      - severity = warning
    equal: [alertname]
  - source_matchers:
      - alertname = RedisConnectionDown
    target_matchers:
      - severity = warning
    equal: [alertname]
  - source_matchers:
      - alertname = HFTEngineDown
    target_matchers:
      - severity =~ warning|info
    equal: [alertname]
  # Generic: same-alertname critical suppresses warning
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname]
