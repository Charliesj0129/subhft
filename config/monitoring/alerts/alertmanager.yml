route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram-bridge'
  routes:
  - match:
      severity: critical
    receiver: 'telegram-bridge'
    repeat_interval: 5m

receivers:
- name: 'telegram-bridge'
  webhook_configs:
  - url: 'http://hft-engine:8081/webhook/alertmanager'
    send_resolved: true
