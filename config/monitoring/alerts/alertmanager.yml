route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  receiver: 'default-noop'
  routes:
  - match:
      severity: critical
    receiver: 'default-noop'
    repeat_interval: 5m

receivers:
- name: 'default-noop'
  webhook_configs:
  - url: 'http://localhost:9099/noop'
    send_resolved: true

