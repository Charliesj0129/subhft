# AlertManager Production Configuration
# Requires: SLACK_WEBHOOK_URL, PAGERDUTY_INTEGRATION_KEY env vars

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

route:
  receiver: slack-warnings
  group_by: ["alertname", "strategy"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts -> PagerDuty + Slack
    - receiver: pagerduty-critical
      match:
        severity: critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: true

    - receiver: slack-critical
      match:
        severity: critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h

    # Warning alerts -> Slack only
    - receiver: slack-warnings
      match:
        severity: warning
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    # Info alerts -> Slack low-priority
    - receiver: slack-info
      match:
        severity: info
      group_wait: 1m
      group_interval: 15m
      repeat_interval: 12h

receivers:
  - name: slack-critical
    slack_configs:
      - channel: "#hft-alerts-critical"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: "[CRITICAL] {{ .GroupLabels.alertname }}"
        text: >-
          *Strategy*: {{ .GroupLabels.strategy }}

          {{ range .Alerts }}
          *Alert*: {{ .Annotations.summary }}
          *Details*: {{ .Annotations.description }}
          *Since*: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}
        actions:
          - type: button
            text: "View in Grafana"
            url: "http://localhost:3000/d/hft-production"
          - type: button
            text: "HALT Runbook"
            url: "https://github.com/your-org/hft-platform/blob/main/docs/runbooks/halt-recovery.md"

  - name: slack-warnings
    slack_configs:
      - channel: "#hft-alerts"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: "[WARNING] {{ .GroupLabels.alertname }}"
        text: >-
          *Strategy*: {{ .GroupLabels.strategy }}

          {{ range .Alerts }}
          *Alert*: {{ .Annotations.summary }}
          *Details*: {{ .Annotations.description }}
          {{ end }}

  - name: slack-info
    slack_configs:
      - channel: "#hft-alerts-info"
        send_resolved: false
        title: "[INFO] {{ .GroupLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ end }}

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: "${PAGERDUTY_INTEGRATION_KEY}"
        severity: critical
        description: "{{ .GroupLabels.alertname }} ({{ .GroupLabels.strategy }})"
        details:
          firing: "{{ .Alerts.Firing | len }}"
          resolved: "{{ .Alerts.Resolved | len }}"
          alertname: "{{ .GroupLabels.alertname }}"
          strategy: "{{ .GroupLabels.strategy }}"

# Inhibition rules: suppress lower-severity alerts when higher-severity fires
inhibit_rules:
  # If HALT is active (critical), suppress related warnings
  - source_matchers:
      - severity = critical
      - alertname = StormGuardHalt
    target_matchers:
      - severity = warning
    equal: ["strategy"]

  # If ClickHouse is down (critical), suppress CH insert latency warnings
  - source_matchers:
      - severity = critical
      - alertname = ClickHouseConnectionDown
    target_matchers:
      - severity = warning
      - alertname =~ "ClickHouse.*"

  # If feed is dead (critical), suppress feed rate warnings
  - source_matchers:
      - severity = critical
      - alertname = FeedGapCritical
    target_matchers:
      - severity = warning
      - alertname =~ "Feed.*"
