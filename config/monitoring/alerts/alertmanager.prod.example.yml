# AlertManager Production Configuration (WU-11)
# Copy to alertmanager.prod.yml and set environment variables before deploying.
#
# Required env vars:
#   ALERTMANAGER_TELEGRAM_BOT_TOKEN  - Telegram bot token for critical alerts
#   ALERTMANAGER_TELEGRAM_CHAT_ID    - Telegram chat/group ID for critical alerts
#   ALERTMANAGER_SLACK_WEBHOOK_URL   - Slack incoming webhook URL for warnings

global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_by: [alertname, severity, symbol]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: telegram-critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 15m
      continue: false

    - match:
        severity: warning
      receiver: slack-warning
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      continue: false

    - match:
        severity: info
      receiver: "null"
      continue: false

receivers:
  - name: telegram-critical
    webhook_configs:
      - url: "https://api.telegram.org/bot$ALERTMANAGER_TELEGRAM_BOT_TOKEN/sendMessage"
        send_resolved: true
        http_config:
          follow_redirects: true
        # POST body is rendered by AlertManager template; configure
        # a custom template or use an intermediary webhook bridge
        # (e.g. alertmanager-telegram-bot) that accepts AlertManager
        # JSON and forwards formatted messages to the chat.
        # Chat ID is injected via the bridge config or query param:
        #   ?chat_id=$ALERTMANAGER_TELEGRAM_CHAT_ID

  - name: slack-warning
    slack_configs:
      - api_url: "$ALERTMANAGER_SLACK_WEBHOOK_URL"
        send_resolved: true
        channel: "#hft-alerts"
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Severity*: {{ .CommonLabels.severity }}
          *Symbol*: {{ .CommonLabels.symbol | default "N/A" }}
          *Summary*: {{ .CommonAnnotations.summary }}
          *Description*: {{ .CommonAnnotations.description }}

  - name: "null"

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname]
