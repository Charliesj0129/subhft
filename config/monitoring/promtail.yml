# Promtail Configuration
# Scrapes Docker container logs and forwards to Loki
# Parses JSON structlog format for label extraction

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576  # 1MB
    timeout: 10s

scrape_configs:
  # Docker container logs via Docker socket
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=hft_platform"]

    relabel_configs:
      # Extract container name as label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # Extract compose service name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      # Set job label from service name
      - source_labels: ["service"]
        target_label: job
      # Drop non-HFT containers
      - source_labels: ["service"]
        regex: "(hft-engine|hft-monitor|wal-loader|clickhouse|redis)"
        action: keep

    pipeline_stages:
      # Parse JSON structlog output
      - json:
          expressions:
            level: level
            event: event
            module: module
            strategy: strategy
            symbol: symbol
            ts: timestamp
            error: error

      # Extract labels from parsed JSON
      - labels:
          level:
          module:

      # Map structlog levels to Loki-compatible levels
      - match:
          selector: '{job="hft-engine"}'
          stages:
            - regex:
                expression: '"level":"(?P<log_level>debug|info|warning|error|critical)"'
            - labels:
                log_level:

      # Drop debug logs in production to reduce volume
      - match:
          selector: '{log_level="debug"}'
          action: drop
          drop_counter_reason: debug_logs_dropped

      # Add timestamp from structlog ts field
      - timestamp:
          source: ts
          format: UnixMs
          fallback_formats:
            - "2006-01-02T15:04:05.000Z"
          action_on_failure: fudge

      # Structured metadata for high-cardinality fields (Loki 2.9+)
      - structured_metadata:
          strategy:
          symbol:
          error:

  # WAL loader logs (separate job)
  - job_name: wal-loader
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name: label
            values: ["com.docker.compose.service=wal-loader"]

    relabel_configs:
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: job

    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            file: wal_file
            rows: rows_replayed

      - labels:
          level:

  # ClickHouse error logs
  - job_name: clickhouse
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name: label
            values: ["com.docker.compose.service=clickhouse"]

    relabel_configs:
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: job

    pipeline_stages:
      # ClickHouse uses its own log format
      - regex:
          expression: '(?P<ch_timestamp>\d{4}\.\d{2}\.\d{2} \d{2}:\d{2}:\d{2}\.\d+) \[ \d+ \] \{[^}]*\} <(?P<ch_level>\w+)> (?P<ch_message>.*)'

      - labels:
          ch_level:

      # Only keep Warning and Error level CH logs
      - match:
          selector: '{ch_level=~"Trace|Debug|Information"}'
          action: drop
          drop_counter_reason: clickhouse_verbose_dropped
