# Signal Monitor TUI — watchlist configuration
# Futures first (night+day), then top liquid stocks (day only)

monitor:
  poll_interval_s: 2.0
  warmup_ticks: 32
  stale_threshold_s: 6.0
  max_retries: 20
  data_source: auto

symbols:
  # === Futures (night + day) ===
  - code: MXFE6
    alpha_ids: [queue_imbalance, microprice_momentum, flow_mode_decomp, depth_concentration_index]
  - code: TMFE6
    alpha_ids: [queue_imbalance, microprice_momentum, flow_mode_decomp, depth_concentration_index]
