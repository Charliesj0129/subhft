# Signal Monitor TUI — watchlist configuration
# Futures first (night+day), then top liquid stocks (day only)

monitor:
  poll_interval_s: 2.0
  warmup_ticks: 32
  stale_threshold_s: 6.0
  max_retries: 20
  data_source: auto
  # Keep the shipped default on an alpha that exists in research/alphas
  # and can run directly on the monitor's L1 payload shape.
  default_alpha_ids: [lob_kinetic_energy]

symbols:
  # === Futures (night + day) — C0 = front month alias (no monthly update) ===
  - code: MXFC0
    alpha_ids: []
  - code: TMFC0
    alpha_ids: []
  - code: TXFC0
    alpha_ids: []
  # === Top Stocks (day session) ===
  - code: "2330"
    alpha_ids: []
  - code: "2317"
    alpha_ids: []
  - code: "2454"
    alpha_ids: []
  - code: "2881"
    alpha_ids: []
  - code: "2882"
    alpha_ids: []
  - code: "2886"
    alpha_ids: []
  - code: "2891"
    alpha_ids: []
  - code: "1301"
    alpha_ids: []
  - code: "1303"
    alpha_ids: []
  - code: "2303"
    alpha_ids: []
  - code: "2412"
    alpha_ids: []
  - code: "3008"
    alpha_ids: []
  - code: "3034"
    alpha_ids: []
  - code: "2603"
    alpha_ids: []
