futures:
  TX:
    commission_per_contract: 60
    tax_rate_bps: 2.0
    tax_side: sell
    tick_size: 1
    point_value: 200

  MTX:
    commission_per_contract: 30
    tax_rate_bps: 2.0
    tax_side: sell
    tick_size: 1
    point_value: 50

  XMT:
    commission_per_contract: 13
    # 2026-04-20: bumped from 7 to 8 NTD/contract. Broker reality (today's
    # TMFE6 trading): tax 798 NTD / 106 fills = 7.53 NTD/fill. Round up to be
    # conservative; under-estimating tax inflates platform's drawdown view.
    tax_per_contract: 8
    tax_side: both
    tick_size: 1
    point_value: 10

  stock_futures_default:
    commission_per_contract: 20
    tax_rate_bps: 4.0
    tax_side: sell
    tick_size: 0.01
    point_value: 2000

  overrides:
    "2330F":
      commission_per_contract: 25

# Symbol map: maps broker symbol → product fee schedule.
# Root symbols (TXF, MXF, TMF) are always matched.
# Specific month codes kept for backward compatibility; new months are resolved
# via root-prefix fallback in fee_calculator._resolve_product().
symbol_map:
  TXF: TX
  TXFR1: TX
  MXF: MTX
  MXFR1: MTX
  XMT: XMT
  TMF: XMT
