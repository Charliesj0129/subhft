# Strategy Registry — loaded by strategy/registry.py
# Format: strategies: list of {id, module, class, params, ...}
#
# IMPORTANT: All spread thresholds use POINTS (not bps).
# Points are stable across price levels; bps shifts with index value.
# Breakeven = RT_cost_NTD / point_value_NTD (e.g. TMF: 40/10 = 4 pts)
#
# SYMBOL CONVENTION: Use R1/R2 continuous codes (e.g. TMFR1 = front month).
# Aliases are resolved to actual month codes at runtime after broker login.
# This eliminates monthly manual updates.

strategies:
  # --- OpportunisticMM on TMF (微台指) — SHADOW MODE ---
  # Point-based threshold: RT cost = 40 NTD = 4 pts, threshold = 5 pts (1 pt edge)
  # Economics: 1 pt = 10 NTD, median spread 4 pts, avg profitable spread 19.7 pts
  # Research: Round 16, docs/alpha-research/
  - id: "OPPORTUNISTIC_MM_TMF"
    module: "hft_platform.strategies.opportunistic_mm"
    class: "OpportunisticMM"
    enabled: false
    product_type: "FUT"
    symbols: ["TMFR1"]
    params:
      spread_threshold_pts: 5    # 5 pts > 4 pts breakeven (RT 40 NTD / 10 NTD per pt)
      tick_size_ratio_pct: 50

  # --- OpportunisticMM on TXF (大台) — DISABLED ---
  # Point-based threshold: RT cost ≈ 60 NTD ≈ 0.3 pts (1 pt = 200 NTD), threshold = 3 pts
  # Disabled: switching shadow focus to TMF
  - id: "OPPORTUNISTIC_MM_TXF"
    module: "hft_platform.strategies.opportunistic_mm"
    class: "OpportunisticMM"
    enabled: false
    product_type: "FUT"
    symbols: ["TXFR1"]
    params:
      spread_threshold_pts: 3    # 3 pts (conservative for 大台)
      tick_size_ratio_pct: 50

  # --- Cascade Bounce Strategy (TMF rollout) ---
  # Vol-normalized contrarian entry with IOC-at-touch entry and passive limit exit.
  # During rollout this is the only enabled TMF live strategy because intraday_pnl
  # remains global in strategy_limits.yaml.
  - id: "CBS_TMF"
    module: "hft_platform.strategies.cascade_bounce"
    class: "CascadeBounceStrategy"
    enabled: false  # Disabled: 0/84 contrarian, 0/6 momentum configs profitable
    product_type: "FUT"
    symbols: ["TMFR1"]
    params:
      lookback_ns: 60000000000         # 60s vol window
      trigger_sigma: 3.0
      max_hold_ns: 300000000000        # 300s max hold
      take_profit_pts: 8
      stop_loss_pts: 6
      min_vol_samples: 8
      max_spread_pts: 3               # Skip entry when spread > 3 pts (wide spread = bad IOC fill)
      session_start_sec: 0            # 00:00 TWN — full-day fallback; SessionGovernor is authoritative in prod
      session_end_sec: 86400          # 24:00 TWN — keeps day/night sessions eligible when governor is enabled

  # --- Momentum Bounce (CBS-Flipped) TMF — SHADOW MODE ---
  # Trades WITH sigma-normalized large moves (momentum, not contrarian).
  # Trailing stop + hard SL + time exit. Deploy with HFT_ORDER_MODE=sim.
  # March regime: 51% win, median ~breakeven. Jan-Feb: anti-momentum.
  # Shadow mode accumulates OOS evidence; switch to live after 5+ positive days.
  - id: "MOMENTUM_BOUNCE_TMF"
    module: "hft_platform.strategies.momentum_bounce"
    class: "MomentumBounceStrategy"
    enabled: false  # Disabled: research incomplete, not ready for live
    product_type: "FUT"
    symbols: ["TMFR1"]
    params:
      lookback_ns: 60000000000         # 60s vol window (same as CBS)
      trigger_sigma: 3.0               # 3-sigma normalized move threshold
      max_hold_ns: 900000000000        # 900s (15 min) max hold
      stop_loss_pts: 10                # Hard SL at -10 pts
      trailing_stop_pts: 6             # Trail 6 pts from peak PnL
      min_vol_samples: 8
      max_spread_pts: 3                # Skip entry when spread > 3 pts
      session_start_sec: 0
      session_end_sec: 86400

  # --- TX→TMF Lead-Lag (R28) — DISABLED (shadow) ---
  # Cross-symbol momentum: TX large-volume ticks predict TMF 10-30min moves.
  # Research: R28, E[net]=+30.6 pts/trade (SL100 + 15min horizon).
  # Enable for shadow: set enabled=true, run with HFT_ORDER_MODE=sim
  # Subscribes to BOTH TXF (signal) and TMF (trade).
  - id: "TX_TMF_LEADLAG"
    module: "hft_platform.strategies.tx_tmf_leadlag"
    class: "TxTmfLeadLagStrategy"
    enabled: false
    product_type: "FUT"
    symbols: ["TXFR1", "TMFR1"]
    params:
      signal_symbol: "TXFR1"
      trade_symbol: "TMFR1"
      dvol_threshold: 20
      sl_pts: 100
      max_hold_ns: 900000000000      # 15min
      max_position_lots: 3
      cooldown_ns: 5000000000         # 5s between entries
      session_start_sec: 2700         # 00:45 UTC = 08:45 TWN
      session_end_sec: 20700          # 05:45 UTC = 13:45 TWN

  # --- R47 Maker (TMF) — Spread-Filtered MM ---
  # Compromise backtest (25 days, CK-direct with queue model):
  #   spr5_back (most conservative): +10,856 pts, 36,217 fills, 69.3% WR
  #   spr5_mid: +34,051 pts, 55,639 fills, 73.6% WR, +13.6K NTD/day
  # TMF economics: 1pt=10NTD, RT cost=4.0pts. spread>=5 profitable with QI skew.
  # 2026-04-10: Optimized for TMF fee structure. QI skew reduces AS by ~20%.
  - id: "R47_MAKER_TMF"
    module: "hft_platform.strategies.r47_maker"
    class: "R47MakerStrategy"
    enabled: true
    product_type: "FUT"
    symbols: ["TMFE6"]              # Bug 12 workaround 2026-04-17: use actual month; R1 alias fails to propagate on restart
    params:
      pe_danger_threshold: 0.0     # Disabled
      pe_window: 100
      queue_cancel_threshold: 1.0  # Disabled (1.0 = never suppress)
      queue_ema_alpha: 0.05
      mfg_skew_z_threshold: 100.0  # Disabled
      mfg_ema_alpha: 0.01
      spread_threshold_pts: 5      # TMFD6: spr>=5 profitable after 4.0pts RT cost
      toxicity_max: 9999           # Disabled (negligible on TMFD6)
      qi_skew_threshold: 0.10     # D4: QI |imbalance| > 0.10 → widen adverse side
      qi_widen_ticks: 1           # Widen by 1 tick (w=1 optimal for total PnL + Sharpe)
      max_pos: 1                   # Manually set: max 1 lot (2026-04-11)

  # --- Electronic Eye (TXO Options MM + Delta Hedge) — DISABLED ---
  # Phase 3: Automated options market-making with delta-neutral hedging.
  # Enable for shadow: set enabled=true, run with HFT_ORDER_MODE=sim
  # TXO multiplier: 50 NTD/pt, tick_size: 1.0 pt (premium >= 10)
  - id: "electronic_eye"
    module: "hft_platform.strategies.electronic_eye"
    class: "ElectronicEye"
    enabled: false
    product_type: "OPT"
    symbol_tags: ["options", "txo"]
    budget_us: 500
    params:
      quoter:
        min_edge_ticks: 2
        max_contracts_per_strike: 5
        quote_strikes: "atm_pm3"
        quote_types: ["C", "P"]
        refresh_interval_ms: 500
        cancel_on_stale_ms: 2000
      hedger:
        hedge_instrument: "TXFR1"
        delta_threshold_lots: 3
        hedge_order_type: "MKT"
        hedge_tif: "IOC"
        hedge_cooldown_ms: 1000
        max_hedge_qty_per_order: 10
      guardian:
        warn_utilization_pct: 80
        stress_interval_s: 60
        max_worst_case_pnl_ntd: -500000
      publish:
        channel: "monitor:portfolio:greeks"
        interval_ms: 1000

  # --- C14 TXF Front-Month Maker — SHADOW ONLY ---
  # R47 maker strategy on TXF rolling front-month (TXFB6 → TXFC6 → TXFD6).
  # Promoted 2026-04-17 (R6 round). Research: research/alphas/c14_txf_frontmonth_native_maker/
  # Scorecard: OOS Sharpe 18.89, +313K NTD/day (p_front=0.3). Shadow default p_front=0.2 (pessimistic).
  # Symbols list is literal for now; production front-month rotator is a post-shadow
  # engineering item (see RELEASE_GATE.md). Live runtime quotes on whichever subscribed
  # symbol produces events.
  # Economics: 1 pt = 200 NTD, RT cost 0.48 pt, front-month median spread 2-5 pt.
  - id: "C14_TXF_FRONTMONTH_MAKER"
    module: "hft_platform.strategies.c14_txf_frontmonth_maker"
    class: "C14TxfFrontMonthMakerStrategy"
    enabled: false                   # SHADOW ONLY — do not enable without user approval
    product_type: "FUT"
    symbols: ["TXFB6", "TXFC6", "TXFD6"]
    params:
      max_pos: 3                     # R47 structural minimum (max_pos=1 turns +4,504 → -1,407)
      spread_threshold_pts: 3        # TXF breakeven ~0.5 pts; 3 pts = comfortable margin
      inventory_skew_tenths: 2       # 0.2 ticks/contract fixed skew (R47 structural best)
      shadow_mode: true              # Paired with HFT_ORDER_SHADOW_MODE=1 at launch
      p_front_shadow_flag: 0.2       # pessimistic sensitivity — informational echo in metrics
      rollover_rule: "volume_crossover"  # see research/alphas/c14_txf_frontmonth_native_maker/frontmonth.py

  # --- C17 TMF Front-Month Maker — SHADOW ONLY ---
  # R47 maker strategy on TMF rolling front-month (TMFB6 → TMFC6 → TMFD6).
  # Approved T2 2026-04-17 (R10 round). Research: research/alphas/c17_tmf_frontmonth_native_maker/
  # TMF analog of C14 (1 pt = 10 NTD, RT cost 4.0 pt vs TXF 0.48 pt).
  # SWITCH semantics: REPLACES the deployed R47_MAKER_TMF max_pos=1.
  # MUST NOT run simultaneously — doing so replicates R51-C1b kill (net -109K NTD).
  # Economics: 1 pt = 10 NTD, RT cost 4.0 pt, front-month median spread 2-3 pt.
  # The live-runtime wrapper class is added at T8 post-PROMOTE; leaving the
  # module/class strings here keeps the entry registry-valid when wired.
  - id: "C17_TMF_FRONTMONTH_MAKER"
    module: "hft_platform.strategies.c17_tmf_frontmonth_maker"
    class: "C17TmfFrontMonthMakerStrategy"
    enabled: false                   # SHADOW ONLY — do not enable without user approval
    product_type: "FUT"
    symbols: ["TMFB6", "TMFC6", "TMFD6"]
    params:
      max_pos: 3                     # R47 structural minimum
      spread_threshold_pts: 5        # TMF RT 4.0 pt requires >=5 pt spread for positive edge
      inventory_skew_tenths: 2       # 0.2 ticks/contract fixed skew
      shadow_mode: true
      p_front_shadow_flag: 0.2       # pessimistic queue-position shadow flag
      rollover_rule: "volume_crossover"
      switch_from_strategy: "R47_MAKER_TMF"  # disable before enabling C17

  # --- C27 Vol-Percentile Amplification on C14 — SHADOW ONLY ---
  # Modulator on C14: baseline max_pos=3, amplified to 4 during high-vol minutes
  # (within-day 1-min realized-vol percentile > P90, hysteresis release at P70).
  # R14 candidate; T2 CONDITIONAL-APPROVE (FIFO inflation caught in Researcher's
  # explore.py — T5 used authoritative position-boundary accounting).
  # Mechanism inversion of R7 C13 DISABLE gate (KILLED). Same signal, opposite action.
  # Live wrapper class is added at T8 post-PROMOTE (not authored until T6/T7 decide).
  - id: "C27_VOL_AMPLIFIED_C14"
    module: "hft_platform.strategies.c27_vol_amplified_c14"
    class: "C27VolAmplifiedStrategy"
    enabled: false                   # SHADOW ONLY
    product_type: "FUT"
    symbols: ["TXFB6", "TXFC6", "TXFD6"]
    params:
      spread_threshold_pts: 3        # inherits C14
      max_pos_baseline: 3            # baseline state (R47 structural optimum)
      max_pos_amplified: 4           # amplified state during high-vol minutes
      inventory_skew_tenths: 2       # inherits C14
      vol_percentile_threshold: 0.90 # trigger amplified above P90
      vol_percentile_release: 0.70   # release below P70 (hysteresis)
      vol_window_seconds: 60         # informational; gate uses minute buckets
      warmup_minutes: 10             # minutes of history before gate can fire
      shadow_mode: true
      p_front_shadow_flag: 0.2       # inherits C14 shadow-default
      rollover_rule: "volume_crossover"
      switch_from_strategy: "C14_TXF_FRONTMONTH_MAKER"  # C27 REPLACES C14 (not co-deploy)
