# Strategy Registry — loaded by strategy/registry.py
# Format: strategies: list of {id, module, class, params, ...}
#
# IMPORTANT: All spread thresholds use POINTS (not bps).
# Points are stable across price levels; bps shifts with index value.
# Breakeven = RT_cost_NTD / point_value_NTD (e.g. TMFD6: 40/10 = 4 pts)

strategies:
  # --- OpportunisticMM on TMFD6 (微台指) — SHADOW MODE ---
  # Point-based threshold: RT cost = 40 NTD = 4 pts, threshold = 5 pts (1 pt edge)
  # Economics: 1 pt = 10 NTD, median spread 4 pts, avg profitable spread 19.7 pts
  # Research: Round 16, docs/alpha-research/
  - id: "OPPORTUNISTIC_MM_TMFD6"
    module: "hft_platform.strategies.opportunistic_mm"
    class: "OpportunisticMM"
    enabled: false
    product_type: "FUT"
    symbols: ["TMFD6"]
    params:
      spread_threshold_pts: 5    # 5 pts > 4 pts breakeven (RT 40 NTD / 10 NTD per pt)
      tick_size_ratio_pct: 50

  # --- OpportunisticMM on TXFD6 (大台) — DISABLED ---
  # Point-based threshold: RT cost ≈ 60 NTD ≈ 0.3 pts (1 pt = 200 NTD), threshold = 3 pts
  # Disabled: switching shadow focus to TMFD6
  - id: "OPPORTUNISTIC_MM_TXFD6"
    module: "hft_platform.strategies.opportunistic_mm"
    class: "OpportunisticMM"
    enabled: false
    product_type: "FUT"
    symbols: ["TXFD6"]
    params:
      spread_threshold_pts: 3    # 3 pts (conservative for 大台)
      tick_size_ratio_pct: 50

  # --- Cascade Bounce Strategy (TMFD6 rollout) ---
  # Vol-normalized contrarian entry with IOC-at-touch entry and passive limit exit.
  # During rollout this is the only enabled TMFD6 live strategy because intraday_pnl
  # remains global in strategy_limits.yaml.
  - id: "CBS_TMFD6"
    module: "hft_platform.strategies.cascade_bounce"
    class: "CascadeBounceStrategy"
    enabled: true
    product_type: "FUT"
    symbols: ["TMFD6"]
    params:
      lookback_ns: 60000000000         # 60s vol window
      trigger_sigma: 3.0
      max_hold_ns: 300000000000        # 300s max hold
      take_profit_pts: 8
      stop_loss_pts: 6
      min_vol_samples: 8
      session_start_sec: 0             # SessionGovernor owns day/night gating
      session_end_sec: 86400
