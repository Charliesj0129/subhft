
# Strategy Limits and Risk Params
global_limits:
  max_position_notional: 500000000   # 50K NTD x10000
  max_order_size: 2                  # Max 2 lots
  max_daily_loss: 10000000           # 1K NTD x10000 (2% HALT)

# global_defaults is the key read by risk validators at runtime
global_defaults:
  max_notional: 500000000            # 50K NTD x10000
  per_symbol_max_notional: 500000000 # Single symbol for futures
  max_position_lots: 2               # Max 2 lots
  max_daily_loss: 10000000           # 1K NTD x10000

strategies:
  MM_ALPHA_V1:
    max_position: 2
    max_order_qty: 1
