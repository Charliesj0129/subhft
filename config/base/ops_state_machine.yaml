ops:
  pre_market_lead_minutes: 60
  post_market_delay_minutes: 15
  night_session_enabled: true

  contract_lifecycle:
    futures_refresh_cron: "0 7 * * 1-5"
    options_refresh_cron: "0 7 * * 1"
    expiry_warn_days: [3, 1]
    option_strike_range: 10

  preflight:
    timeout_s: 300
    retry_interval_s: 30
    max_retries: 5
