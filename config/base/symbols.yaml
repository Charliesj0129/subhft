  # --- TXO Options: ATM +/- 5 strikes (front-month, April 2026) ---
  # Strike selection: TAIEX ~23000 as of 2026-03-30.
  # Dynamic strike selection is NOT yet automated — update these manually
  # when TAIEX moves significantly (+/- 500 pts) or on monthly rollover.
  # Shioaji code format: TXO<strike><month_code><year_digit>
  #   Call month codes: A=Jan, B=Feb, C=Mar, D=Apr, ...
  #   Put month codes:  M=Jan, N=Feb, O=Mar, P=Apr, ...
  # April 2026 = D6 (call) / P6 (put)
  # TXO fee: tax 2 NTD/side, commission ~15 NTD/side (retail)
  # TXO multiplier: 50 NTD per index point
  # TXO tick_size: 1.0 pt for premium >= 10, 0.1 pt for premium < 10
  #   (ATM strikes have premium >> 10, so tick_size=1.0 is correct)
  - code: "TXO22500D6"
    exchange: OPT
    product_type: option
    underlying: TX
    point_value: 50
    tick_size: 1.0
    price_scale: 10000
    right: C
    strike: 22500
    expiry: "2026-04-15"
    tax_rate_bps: 10
    commission_per_lot: 150000
    day_open: "08:45"
    day_close: "13:45"
    night_open: "15:00"
    night_close: "05:00"
    tags: [options, txo, front_month, call, r24_diagnostic]
