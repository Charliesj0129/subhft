broker: shioaji  # shioaji | fubon — selects BrokerFacade implementation

mode: sim
symbols:
  - "TMFD6"

strategy:
  id: OPPORTUNISTIC_MM_TMFD6
  module: hft_platform.strategies.opportunistic_mm
  class: OpportunisticMM
  params:
    spread_threshold_pts: 5    # 5 pts > 4 pts breakeven (RT 40 NTD / 10 NTD per pt)
    tick_size_ratio_pct: 50

paths:
  symbols: config/base/symbols.yaml
  strategy_limits: config/base/strategy_limits.yaml
  order_adapter: config/base/order_adapter.yaml

prometheus_port: 9090

replay:
  start_date: null
  end_date: null
