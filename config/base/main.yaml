broker: shioaji  # shioaji | fubon — selects BrokerFacade implementation

mode: sim
symbols:
  - "TMFR1"    # R1 = Shioaji continuous front-month (no monthly update)
  - "TXFR1"    # R1 = Shioaji continuous front-month

strategy:
  id: CBS_TMF
  module: hft_platform.strategies.cascade_bounce
  class: CascadeBounceStrategy
  params:
    lookback_ns: 60000000000
    trigger_sigma: 3.0
    max_hold_ns: 300000000000
    take_profit_pts: 8
    stop_loss_pts: 6
    min_vol_samples: 8
    session_start_sec: 0
    session_end_sec: 86400

paths:
  symbols: config/base/symbols.yaml
  strategy_limits: config/base/strategy_limits.yaml
  order_adapter: config/base/order_adapter.yaml

prometheus_port: 9090

replay:
  start_date: null
  end_date: null
