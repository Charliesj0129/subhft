x-hft-common: &hft-common
  env_file: .env
  build: .
  image: ${HFT_IMAGE:-hft-platform:latest}
  restart: always
  # Common Environment for all HFT services
  environment:
    - SHIOAJI_API_KEY=${SHIOAJI_API_KEY}
    - SHIOAJI_SECRET_KEY=${SHIOAJI_SECRET_KEY}
    - SHIOAJI_PERSON_ID=${SHIOAJI_PERSON_ID}
    - CA_CERT_PATH=${CA_CERT_PATH:-}
    - CA_PASSWORD=${CA_PASSWORD:-}
    - SHIOAJI_ACTIVATE_CA=${SHIOAJI_ACTIVATE_CA:-0}
    - SHIOAJI_ACCOUNT=${SHIOAJI_ACCOUNT:-}
    - HFT_MODE=${HFT_MODE:-sim}
    - HFT_ORDER_MODE=${HFT_ORDER_MODE:-sim}
    - HFT_ORDER_NO_CA=${HFT_ORDER_NO_CA:-1}
    - HFT_QUOTE_VERSION=${HFT_QUOTE_VERSION:-auto}
    - HFT_QUOTE_NO_DATA_S=${HFT_QUOTE_NO_DATA_S:-30}
    - HFT_QUOTE_WATCHDOG_S=${HFT_QUOTE_WATCHDOG_S:-5}
    - HFT_QUOTE_FLAP_WINDOW_S=${HFT_QUOTE_FLAP_WINDOW_S:-60}
    - HFT_QUOTE_FLAP_THRESHOLD=${HFT_QUOTE_FLAP_THRESHOLD:-5}
    - HFT_QUOTE_FLAP_COOLDOWN_S=${HFT_QUOTE_FLAP_COOLDOWN_S:-300}
    - HFT_QUOTE_FORCE_RELOGIN_S=${HFT_QUOTE_FORCE_RELOGIN_S:-15}
    - HFT_EVENT_MODE=${HFT_EVENT_MODE:-event}
    - HFT_SYMBOLS=${HFT_SYMBOLS:-}
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - SYMBOLS_CONFIG=${SYMBOLS_CONFIG:-config/base/symbols.yaml}
    - HFT_CLICKHOUSE_HOST=clickhouse
    - HFT_CLICKHOUSE_PORT=${HFT_CLICKHOUSE_PORT:-8123}
    - HFT_CLICKHOUSE_ENABLED=1
    - HFT_CH_INSERT_POOL_SIZE=${HFT_CH_INSERT_POOL_SIZE:-4}
    - HFT_CH_MAX_CONCURRENT_INSERTS=${HFT_CH_MAX_CONCURRENT_INSERTS:-2}
    - HFT_CH_INSERT_CHUNK_ROWS=${HFT_CH_INSERT_CHUNK_ROWS:-256}
    - HFT_WAL_LOADER_CONCURRENCY=${HFT_WAL_LOADER_CONCURRENCY:-1}
    - HFT_INSERT_MAX_RETRIES=${HFT_INSERT_MAX_RETRIES:-4}
    - HFT_INSERT_BASE_DELAY_S=${HFT_INSERT_BASE_DELAY_S:-0.6}
    - HFT_INSERT_MAX_BACKOFF_S=${HFT_INSERT_MAX_BACKOFF_S:-8.0}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
    - HFT_RECONNECT_DAYS=${HFT_RECONNECT_DAYS:-}
    - HFT_RECONNECT_HOURS=${HFT_RECONNECT_HOURS:-}
    - HFT_RECONNECT_HOURS_2=${HFT_RECONNECT_HOURS_2:-}
    - HFT_RECONNECT_TZ=${HFT_RECONNECT_TZ:-Asia/Taipei}
    - TZ=${TZ:-Asia/Taipei}
    - HFT_PROM_PORT=${HFT_PROM_PORT:-9090}
    - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    - HFT_FEATURE_ENGINE_ENABLED=${HFT_FEATURE_ENGINE_ENABLED:-1}
    - HFT_FUSED_NORMALIZER=${HFT_FUSED_NORMALIZER:-0}
    - HFT_FEATURE_ENGINE_BACKEND=${HFT_FEATURE_ENGINE_BACKEND:-python}
    - HFT_GATEWAY_ENABLED=${HFT_GATEWAY_ENABLED:-1}
    - HFT_HEALTH_PORT=${HFT_HEALTH_PORT:-8080}
    - HFT_MONITOR_LIVE_ENABLED=${HFT_MONITOR_LIVE_ENABLED:-0}
    - HFT_MONITOR_REDIS_HOST=${HFT_MONITOR_REDIS_HOST:-redis}
    - HFT_MONITOR_REDIS_PORT=${HFT_MONITOR_REDIS_PORT:-6379}
    - HFT_MONITOR_REDIS_PASSWORD=${HFT_MONITOR_REDIS_PASSWORD:-${REDIS_PASSWORD}}
    # --- StormGuard ---
    - HFT_STORMGUARD_FEED_GAP_STORM_S=${HFT_STORMGUARD_FEED_GAP_STORM_S:-30}
    - HFT_STORMGUARD_LATENCY_STORM_US=${HFT_STORMGUARD_LATENCY_STORM_US:-500000}
    - HFT_STORMGUARD_LATENCY_WARM_US=${HFT_STORMGUARD_LATENCY_WARM_US:-200000}
    - HFT_STORMGUARD_STORM_COOLDOWN_S=${HFT_STORMGUARD_STORM_COOLDOWN_S:-30}
    - HFT_STORMGUARD_DE_ESCALATE_N=${HFT_STORMGUARD_DE_ESCALATE_N:-5}
    - HFT_STORMGUARD_DRIFT_BURST_ENABLED=${HFT_STORMGUARD_DRIFT_BURST_ENABLED:-0}
    - HFT_STORMGUARD_HALT_EXEMPT_STRATEGIES=${HFT_STORMGUARD_HALT_EXEMPT_STRATEGIES:-}
    - HFT_STORMGUARD_FEATURE_RECOVERY_HOLD_S=${HFT_STORMGUARD_FEATURE_RECOVERY_HOLD_S:-5}
    # --- Strategy ---
    - HFT_STRATEGY_TIMEOUT_MS=${HFT_STRATEGY_TIMEOUT_MS:-50}
    - HFT_STRATEGY_TIMEOUT_STRIKES=${HFT_STRATEGY_TIMEOUT_STRIKES:-3}
    - HFT_STRATEGY_TIMEOUT_RECOVER_S=${HFT_STRATEGY_TIMEOUT_RECOVER_S:-60}
    - HFT_DEFAULT_INTENT_TTL_MS=${HFT_DEFAULT_INTENT_TTL_MS:-5000}
    - HFT_MAX_INTENTS_PER_EVENT=${HFT_MAX_INTENTS_PER_EVENT:-20}
    - HFT_STALE_EVENT_THRESHOLD_MS=${HFT_STALE_EVENT_THRESHOLD_MS:-500}
    # --- Gateway ---
    - HFT_GATEWAY_HALT_CANCEL=${HFT_GATEWAY_HALT_CANCEL:-1}
    - HFT_GATEWAY_DEGRADE_ON_STORM=${HFT_GATEWAY_DEGRADE_ON_STORM:-1}
    # --- Feature Engine ---
    - HFT_FEATURE_ENGINE_EMIT_EVENTS=${HFT_FEATURE_ENGINE_EMIT_EVENTS:-1}
    - HFT_FEATURE_FAILURE_ESCALATE=${HFT_FEATURE_FAILURE_ESCALATE:-10}
    - HFT_NORM_FAILURE_ESCALATE=${HFT_NORM_FAILURE_ESCALATE:-50}
    # --- Market Data ---
    - HFT_RAW_QUEUE_SIZE=${HFT_RAW_QUEUE_SIZE:-10000}
    - HFT_RAW_QUEUE_HIGH_WATERMARK=${HFT_RAW_QUEUE_HIGH_WATERMARK:-0.8}
    - HFT_MD_RECORD_DIRECT=${HFT_MD_RECORD_DIRECT:-1}
    - HFT_RECORDER_DROP_ON_FULL=${HFT_RECORDER_DROP_ON_FULL:-1}
    - HFT_WATCHDOG_INTERVAL_S=${HFT_WATCHDOG_INTERVAL_S:-1.0}
    - HFT_SYMBOL_GAP_THRESHOLD_S=${HFT_SYMBOL_GAP_THRESHOLD_S:-6.0}
    - HFT_TRADE_CLASSIFICATION_ENABLED=${HFT_TRADE_CLASSIFICATION_ENABLED:-1}
    # --- Bus Overflow ---
    - HFT_BUS_OVERFLOW_HALT_THRESHOLD=${HFT_BUS_OVERFLOW_HALT_THRESHOLD:-3}
    - HFT_BUS_OVERFLOW_RATE_THRESHOLD=${HFT_BUS_OVERFLOW_RATE_THRESHOLD:-10}
    - HFT_BUS_OVERFLOW_WINDOW_S=${HFT_BUS_OVERFLOW_WINDOW_S:-60}
    - HFT_BUS_DRAIN_TIMEOUT_MS=${HFT_BUS_DRAIN_TIMEOUT_MS:-500}
    # --- Risk DLQ ---
    - HFT_RISK_DLQ_DRAIN_INTERVAL=${HFT_RISK_DLQ_DRAIN_INTERVAL:-50}
    - HFT_RISK_DLQ_TTL_S=${HFT_RISK_DLQ_TTL_S:-30}
    # --- Platform ---
    - HFT_GC_DISABLE_TRADING=${HFT_GC_DISABLE_TRADING:-0}
    - HFT_PLATFORM_AUTO_RECOVERY_ENABLED=${HFT_PLATFORM_AUTO_RECOVERY_ENABLED:-1}
    - HFT_PLATFORM_AUTO_RECOVERY_COOLDOWN_S=${HFT_PLATFORM_AUTO_RECOVERY_COOLDOWN_S:-60}
    - HFT_PNL_EXPORTER_ENABLED=${HFT_PNL_EXPORTER_ENABLED:-1}
    - HFT_CH_SHUTDOWN_TIMEOUT_S=${HFT_CH_SHUTDOWN_TIMEOUT_S:-30}
    - HFT_QUOTE_CONNECTIONS=${HFT_QUOTE_CONNECTIONS:-1}
    # --- Misc ---
    - HFT_ORDER_SHADOW_MODE=${HFT_ORDER_SHADOW_MODE:-0}
    - HFT_SESSION_GOVERNOR_ENABLED=${HFT_SESSION_GOVERNOR_ENABLED:-0}
    - HFT_ENV=${HFT_ENV:-dev}
    - PYTHONDONTWRITEBYTECODE=1
  volumes:
    - ./.wal:/app/.wal
    - ./data:/app/data
    - ./config:/app/config
    - ./scripts:/app/scripts
    - ./src:/app/src
  ulimits:
    memlock: -1
    nofile: 65535
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:${HFT_HEALTH_PORT:-8080}/healthz || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3

services:
  hft-base:
    <<: *hft-common
    container_name: hft-base
    profiles: ["maintenance"]
    command: ["sh", "-lc", "HFT_RUNTIME_ROLE=maintenance sleep infinity"]

  hft-engine:
    <<: *hft-common
    container_name: hft-engine
    command: ["sh", "-lc", "HFT_RUNTIME_ROLE=engine HFT_RECORDER_MODE=${HFT_ENGINE_RECORDER_MODE:-wal_first} python -m hft_platform.main"]
    # Network mode handling
    # Removed default network_mode: ${HFT_NETWORK_MODE:-bridge} to allow proper DNS resolution
    # network_mode: ${HFT_NETWORK_MODE:-}
    ports:
      - "${HFT_PROM_PORT:-9090}:9090"
      - "${HFT_HEALTH_PORT:-8080}:8080"
    volumes:
      - ./.wal:/app/.wal
      - ./data:/app/data
      - ./config:/app/config
      - ./scripts:/app/scripts
      - ./src:/app/src
      # Hugepages mount (only works if mapped on host)
      - /dev/hugepages:/dev/hugepages
      # CA certificate mount (read-only)
      - ${CA_CERT_DIR:-./certs}:/app/certs:ro
    deploy:
      resources:
        limits:
          cpus: '${HFT_CPU_LIMIT:-2.0}'
          memory: ${HFT_MEM_LIMIT:-4G}
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  clickhouse:
    image: clickhouse/clickhouse-server:25.12.3
    container_name: clickhouse
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    ulimits:
      nofile: 262144
    volumes:
      # Always inject storage config (it handles default paths gracefully)
      - ./config/clickhouse_storage.xml:/etc/clickhouse-server/config.d/storage.xml
      # System log TTL + drop-size guard (prevents disk exhaustion from trace_log/text_log)
      - ./config/clickhouse_system_logs.xml:/etc/clickhouse-server/config.d/system_logs.xml
      # Memory cap: prevents Docker OOM kill; ClickHouse returns Code: 241 gracefully instead
      - ./config/clickhouse_memory.xml:/etc/clickhouse-server/config.d/memory.xml
      # Backup disk config + backup storage volume
      - ./config/clickhouse_backup.xml:/etc/clickhouse-server/config.d/backup.xml:ro
      - ./config/clickhouse_prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
      - ${CH_BACKUP_PATH:-./backups/clickhouse}:/backups
      # Configurable Data Root (Tiered Storage)
      - ${CH_DATA_HOT:-ch_data_hot}:/var/lib/clickhouse/data/hot
      - ${CH_DATA_COLD:-ch_data_cold}:/var/lib/clickhouse/data/cold
      # Metadata volume
      - ch_metadata:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 12G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10" 

  redis:
    image: redis:7.4
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 3

  wal-loader:
    <<: *hft-common
    container_name: wal-loader
    command: ["sh", "-lc", "HFT_RUNTIME_ROLE=wal_loader python -m hft_platform.recorder.loader"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      clickhouse:
        condition: service_healthy

  hft-monitor:
    <<: *hft-common
    container_name: hft-monitor
    command: ["sh", "-lc", "HFT_RUNTIME_ROLE=monitor python scripts/monitor_runtime_health.py"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      hft-engine:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      - HFT_MONITOR_METRICS_URL=http://hft-engine:9090/metrics
      - HFT_CLICKHOUSE_HOST=clickhouse
      - HFT_CLICKHOUSE_PORT=${HFT_CLICKHOUSE_PORT:-8123}
      - HFT_CLICKHOUSE_USER=${HFT_CLICKHOUSE_USER:-default}
      - HFT_CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      - HFT_MONITOR_INTERVAL_S=${HFT_MONITOR_INTERVAL_S:-10}
      - HFT_MONITOR_MAX_INGEST_LAG_S=${HFT_MONITOR_MAX_INGEST_LAG_S:-5}
      - HFT_MONITOR_FUTURE_TOLERANCE_S=${HFT_MONITOR_FUTURE_TOLERANCE_S:-60}
      - HFT_MONITOR_FEED_GAP_WARN_S=${HFT_MONITOR_FEED_GAP_WARN_S:-5}
      - HFT_MONITOR_WAL_RATE_WARN=${HFT_MONITOR_WAL_RATE_WARN:-1}
      - HFT_MONITOR_INGEST_RATE_MIN=${HFT_MONITOR_INGEST_RATE_MIN:-1}

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node-exporter/textfile:/var/lib/node-exporter/textfile:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/var/lib/node-exporter/textfile'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/monitoring/alerts/rules.yaml:/etc/prometheus/alerts/rules.yaml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - hft-engine
      - alertmanager
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ${HFT_ALERTMANAGER_CONFIG:-./config/monitoring/alerts/alertmanager.yml}:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    volumes:
      - loki_data:/loki
      - ./config/monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - ./config/monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  hft-bot:
    <<: *hft-common
    container_name: hft-bot
    command: ["sh", "-lc", "python -m hft_platform.bot"]
    environment:
      - HFT_TELEGRAM_BOT_TOKEN=${HFT_TELEGRAM_BOT_TOKEN:?HFT_TELEGRAM_BOT_TOKEN must be set}
      - HFT_TELEGRAM_CHAT_ID=${HFT_TELEGRAM_CHAT_ID:?HFT_TELEGRAM_CHAT_ID must be set}
      - HFT_REPORT_SYMBOLS=${HFT_REPORT_SYMBOLS:-TXFD6}
      - HFT_CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=Asia/Taipei
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  ch_data_hot:
  ch_data_cold:
  ch_metadata:
  loki_data:
