# docker-compose.production.yml — Production overlay (resources + security)
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# Purpose: All production-specific overrides in one file:
# - Resource limits (CPU/memory, configurable via HFT_CPU_LIMIT / HFT_MEM_LIMIT)
# - Security hardening (no-new-privileges, read_only, 127.0.0.1 port binding)
# - Internal bridge network isolation
# - Production alertmanager config
# - Rust fused paths remain disabled until parity gate passes (tracked in docs/TODO.md)

networks:
  hft-internal:
    driver: bridge
    internal: false  # Allow outbound (broker API, DNS); block unsolicited inbound via port binding

x-security-common: &security-common
  security_opt:
    - no-new-privileges:true

services:
  hft-base:
    <<: *security-common
    networks:
      - hft-internal

  hft-engine:
    <<: *security-common
    environment:
      - HFT_FUSED_NORMALIZER=${HFT_FUSED_NORMALIZER:-0}
      - HFT_FEATURE_ENGINE_BACKEND=${HFT_FEATURE_ENGINE_BACKEND:-python}
    deploy:
      resources:
        limits:
          cpus: '${HFT_CPU_LIMIT:-2.0}'
          memory: ${HFT_MEM_LIMIT:-4096M}
    ports:
      - "127.0.0.1:${HFT_PROM_PORT:-9090}:9090"
      - "127.0.0.1:${HFT_HEALTH_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=256M
      - /app/__pycache__:size=64M
      # P2 fix: heartbeat path. Required under read_only=true (writer-side
      # mkdir would EROFS). Mirrors the base-file *hft-common tmpfs entry
      # so production overlay is self-documenting.
      - /var/run/hft:size=10M,mode=0755,uid=1000,gid=1000
    networks:
      - hft-internal

  clickhouse:
    <<: *security-common
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    networks:
      - hft-internal

  redis:
    <<: *security-common
    ports:
      - "127.0.0.1:6379:6379"
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /data:size=256M
    networks:
      - hft-internal

  wal-loader:
    <<: *security-common
    read_only: true
    tmpfs:
      - /tmp:size=128M
    networks:
      - hft-internal

  hft-monitor:
    <<: *security-common
    read_only: true
    tmpfs:
      - /tmp:size=64M
    networks:
      - hft-internal

  node-exporter:
    <<: *security-common
    read_only: true
    networks:
      - hft-internal

  prometheus:
    <<: *security-common
    ports:
      - "127.0.0.1:9091:9090"
    read_only: true
    tmpfs:
      - /tmp:size=64M
    volumes:
      - prometheus_data:/prometheus
    networks:
      - hft-internal

  alertmanager:
    <<: *security-common
    ports:
      - "127.0.0.1:9093:9093"
    read_only: true
    tmpfs:
      - /tmp:size=32M
    volumes:
      - ${HFT_ALERTMANAGER_CONFIG:-./config/monitoring/alerts/alertmanager.production.yml}:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - hft-internal

volumes:
  prometheus_data:
