# HFT Platform gitleaks configuration
#
# Extends the upstream default rule set. The only addition is a global
# allowlist for snake_case threshold-key identifiers used as YAML config
# references inside alpha-gate docstrings. These are config field names
# (e.g. ``cost_uncertainty_p95_lower_bound_min_pts``), NOT credentials.
#
# Trigger: Slice B (#340) Security Scan flagged
# src/hft_platform/alpha/_sub_gates/cost_uncertainty.py:13 with
# generic-api-key (entropy 4.065). The flagged "secret" is the YAML
# threshold-key identifier; treating snake_case_with_numbers identifiers
# in alpha-gate docstrings as config references keeps the rule narrow.

title = "HFT Platform gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Snake_case threshold-key identifiers in alpha-gate docstrings are YAML config keys, not credentials."
regexes = [
    '''cost_uncertainty_p95_lower_bound_min_pts''',
    # Fixture/example values flagged by the scheduled full-history scan
    # (generic-api-key). Each entry is an exact fake value, reviewed 2026-07-13;
    # a real credential can never equal these strings.
    '''orphan-test-key-001''',                    # tests/unit/test_order_adapter_dedup.py idempotency-key fixture
    '''sk-test-12345678''',                       # planted fake for code-review benchmarks (docs/agent-teams, docs/superpowers plans)
    '''eyJhbGciOiJIUzI1NiJ9''',                   # bare JWT header {"alg":"HS256"} — scrubber test vector, no payload/signature
    '''abcdef1234567890abcdef1234567890''',       # docs/runbooks/alerting-setup.md example integration key
    '''depth_imbalance_ema8_ppm''',               # feature-key identifier in deleted research/alphas/lob_shape/impl.py (history-only hit)
]
