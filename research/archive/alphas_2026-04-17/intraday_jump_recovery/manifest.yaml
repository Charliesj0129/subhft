alpha_id: intraday_jump_recovery
hypothesis: >
  Large intraday price moves (jumps) are followed by partial mean-reversion
  (recovery). The recovery is ASYMMETRIC: negative pushes produce stronger
  positive responses than equally-sized positive pushes produce negative
  responses. This push-response relationship is lag-dependent: near-zero
  at short lags (< 5000 ticks), significant at medium lags (5000-150000
  ticks), and plateaus at very long lags. Formalizing CBS as a jump recovery
  strategy with statistical jump detection and asymmetric sizing should
  improve entry quality and P&L vs CBS's fixed-threshold approach.

formula: >
  push_L(t) = m(t) - m(t-L) (backward price increment over L ticks);
  response_L(t) = m(t+L) - m(t) (forward price increment);
  z_push = (push - mu_push) / sigma_push (standardized);
  E[response | z_push] estimated nonparametrically on grid;
  Signal: enter contrarian when |z_push| > threshold_z for optimal L.

paper_refs:
  - "2511.06177"  # Vlasiuk & Smirnov 2025 — Push-response anomalies
  - "2403.00819"  # Bibinger, Hautsch & Ristig 2024 — Jump detection
  - "1901.02691"  # Kanniainen & Yue 2019 — News and return jumps

data_fields:
  - mid_price_x2

complexity: "O(1)"
status: DRAFT
latency_profile: sim_p95_v2026-02-26

cost_model:
