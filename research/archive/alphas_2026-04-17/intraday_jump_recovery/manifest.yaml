  rt_cost_pts: 4
  rt_cost_bps: 1.33

key_findings_from_papers:
  vlasiuk_2025:
    - "Push = m(t) - m(t-L), Response = m(t+L) - m(t), standardized per-lag"
    - "Short lags (1-5000 ticks): response near zero (efficient)"
    - "Medium lags (5000-150000 ticks): pronounced tails, nonzero response"
    - "Negative pushes → stronger positive responses (asymmetric)"
    - "Market mill asymmetry at lags ~5000-150000"
    - "Standardized push grid: z_p in [-4, +4], bins of 0.025 width"
    - "Min 200 observations per bin for statistical validity"
    - "SPY data: 2.6 billion ticks, ~1500 trading days"
