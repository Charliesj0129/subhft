alpha_id: vol_cbs
hypothesis: >
  CBS's fixed 40-bps threshold and 300s hold are suboptimal because they
  ignore the current volatility regime. In high-vol periods, 40 bps is a
  normal fluctuation (noise triggers); in low-vol periods, 40 bps is an
  extreme event (strong signal). Normalizing the entry threshold by
  realized volatility (ATR) and adapting hold/exit by vol regime should:
  (1) reduce false triggers in high-vol, (2) capture more edge in low-vol,
  (3) stabilize risk across regimes via vol-targeting position sizing.

formula: >
  ATR_N(t) = EMA of TrueRange over N ticks;
  threshold(t) = k * ATR_N(t) (vol-adaptive, replaces fixed 40 bps);
  hold_ns(t) = base_hold * (target_vol / realized_vol);
  stop_loss(t) = s * ATR_N(t) (vol-adaptive, replaces fixed 15 bps);
  position_size = base_size * min(max_leverage, target_vol / realized_vol).

paper_refs:
  - "2511.08571"  # Singha et al. 2025 — Forecast-to-Fill (ATR exits, Kelly sizing)
  - "2212.07288"  # Bernardi et al. 2022 — Smoothing volatility targeting
  - "2511.06177"  # Vlasiuk & Smirnov 2025 — Push-response anomalies (CBS foundation)

data_fields:
