key_findings_from_papers:
  singha_2025:
    - "Vol-targeting: sigma_target / sigma_forecast, capped at W_max=2.0"
    - "EWMA variance: sigma^2_{t+1} = theta * sigma^2_t + (1-theta) * r^2_t"
    - "ATR exits: hard stop at entry - 2*ATR14, trailing at peak - 1.5*ATR14"
    - "ATR = 1/n * sum(TrueRange) over n=14 periods"
    - "Kelly fraction: f* = (mu - nk) / sigma^2 (friction-adjusted)"
    - "Sharpe 2.88 OOS on gold futures with this framework"
