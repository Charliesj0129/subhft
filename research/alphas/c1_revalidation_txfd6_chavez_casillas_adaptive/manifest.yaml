hypothesis: >
  Chávez-Casillas et al. (2024) adaptive demand-function quoting on TXFD6,
  restricted to the spread >= 4 pt working zone (T1 §Hypothesis #2). Posting
  distance delta* is computed online from a rolling 30-min demand fit
  (y = alpha + beta * delta) with tau = 5 min exponential decay and refit
  every 5 s. Microprice (Stoikov 2014) replaces mid as reservation reference.
  Cost RT 3.0 pt (TXFD6 retail). T1 best-case expected_edge ~7.5 pt vs
  6 pt 2x floor (25% margin).

mechanism_class: pure_maker

distinction_from_killed_classes:
  - name: "TMFD6-multi-instrument (R51-C1b)"
    distinction: "Different instrument (TXFD6, single leg)."
  - name: "Stoll-3-component-classical (R52-R6)"
    distinction: >
      F9 cost-tier carve-out. Uses Chávez-Casillas adaptive demand function,
      NOT Stoll order-processing+inventory+adverse-selection decomposition.
  - name: "Avellaneda-Stoikov-baseline (R52-R3)"
    distinction: >
      Adaptive delta* from random-coefficient demand function, NOT inventory-
      penalty-CARA-utility A-S construction. q-proportional fixed skew at q=1
      not used (skew comes from asymmetric demand-coefficient drift).
  - name: "R47 maker baseline (TMFD6)"
    distinction: >
      TXFD6 not TMFD6. Adaptive delta* per Chávez-Casillas, not fixed
      touch-quoting. Spread eligibility 4 pt (TXFD6 working zone).
  - name: "spread-conditional-maker (R16)"
    distinction: >
      R16 conditioned on observed-spread only. C1 conditions on
      (spread eligibility) AND (Chávez-Casillas adaptive delta* > 0 with
      positive expected fill-PnL after demand-function update).

