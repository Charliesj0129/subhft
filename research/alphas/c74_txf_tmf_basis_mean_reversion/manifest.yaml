shadow_kill_criterion: >
  (a) 5-day rolling mean per-trip PnL < 0 for 2 consecutive windows OR
  (b) stale-quote filter hit-rate > 10% (indicates bad snapshots or
  regime change) OR (c) 4-sigma stop-loss fires > 5% of trips (indicates
  regime has moved beyond mean-reversion assumption).

