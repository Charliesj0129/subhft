    T5 must demonstrate (a) per-trip PnL distribution (not just aggregate)
    to validate Sharpe, (b) 2x2 session-sigma quartile x direction grid
    is not asymmetrically negative, (c) |basis|>50 filter hit-rate is
    logged, (d) 4-sigma stop-loss activates correctly.

