alpha_id: c74_txf_tmf_basis_mean_reversion
name: "TXF-TMF basis mean-reversion (cross-instrument pair)"
version: "0.1.0"
status: prototype
owner: alpha-research-20260419-inst-options
strategy_type: maker               # cross_instrument_mm — not in enum, maker is closest
instrument: "TXFD6+TMFD6"
instruments:
  - TXFD6
  - TMFD6

run_label: "alpha-research-20260419-inst-options"
round_id: R10
gate_position: "T4 implementation (post T2 APPROVE, pre T5 backtest)"
t2_verdict: APPROVE

hypothesis: >
  Dollar-neutral TXF-TMF basis (basis = mid_txf - 20*mid_tmf) mean-reverts
  on minutes-to-hours scale. Entry when |basis - rolling_mean| > 2 *
  rolling_stdev (60-min adaptive window); exit on reversion to mean OR
  30-min timeout (both MAKER); stop-loss at 4-sigma (TAKER cross). Hedge
  ratio 20 TMF per 1 TXF per dollar-neutral physics (R5 C30 / R7 C66
  lesson). R7 C66 passive-pair was rejected because passive-maker edge
  was dominated by hedge-take cost; C74 avoids that by MAKER-MAKER both
  legs with TAKER only at 4-sigma stop.

mechanism_class: cross_instrument_mm_directional_basis

distinction_from_killed_classes:
  - name: "R7 C66 TXF-TMF passive pair MM"
    distinction: >
      C66 was a continuous-quoting passive pair maker (both sides always
      posted); killed because per-trip edge was dominated by take-hedge
      cost (-940 NTD/trip). C74 is OPPORTUNISTIC directional
      mean-reversion: no continuous quoting; entries gated on |basis -
      mu| > 2-sigma; both legs MAKER; TAKER only at 4-sigma stop. DA T2
      confirmed R7 C66 physics DOES NOT apply (mechanism and cost profile
      distinct).
  - name: "R5-prior C30 hedge-qty 20x undercount"
    distinction: >
      R5 C30 failed because hedge-ratio was 1 (not 20). C74 uses the
      CORRECT 1:20 dollar-neutral ratio from manifest construction.
      Fixed by physics: 200 NTD/pt / 10 NTD/pt = 20.
  - name: "TX-TMF-leadlag (R26/R28, stay_killed)"
    distinction: >
      Lead-lag was directional prediction of TXF direction using TMF
      movement. C74 is the symmetric basis residual — treats TXF and TMF
      as COINTEGRATED and trades the residual on mean-reversion, not
      lead-lag. Different mechanism. DA T2 Fanelli-2023 citation covers
      non-trivial idiosyncratic structure.
  - name: "CBS-mean-reversion (R14-R17, stay_killed)"
    distinction: >
      CBS was intra-instrument mid-price mean reversion, which was a
      mid-price artifact. C74 is inter-instrument residual with bid/ask
      execution. Different observable (basis vs mid) and different
      execution model (bid/ask + TAKER stop).

paper_refs:
  - r47_maker_strategy
  - c60_tmfd6_r47_minimal_inst_rt
  - c63_txfd6_r47_tight_spread
  - shared-context_2026-04-19_cost_model
  - memory/backtest_method_reliability
  - "Fanelli 2023 futures-basis microstructure (cited in DA T2)"
  - "2008 Avellaneda-Stoikov"
  - "2015 Cartea-Jaimungal-Penalva"
  - "r7_summary C66 hedge-cost-dominance lesson"

signals:
  reuse: >
    NONE of the R47 signal layers. C74 is a NEW mechanism:
    rolling mu/sigma over configurable window (default 60 min) on the
    dollar-neutral basis. Entry/exit logic is distinct from R47 family.

parameters:
  window_seconds: 3600                # 60-min rolling (T5 sweeps {300, 1800, 3600})
  entry_sigma: 2.0                    # T5 sweeps {1.5, 2.0, 2.5}
  stop_sigma: 4.0                     # Stop-loss (TAKER cross)
  timeout_seconds: 1800               # 30-min forced exit
  stale_basis_filter_pt: 50           # DA T2 flag #3
  min_samples_for_entry: 120          # warm-up before trusting mu/sigma
  max_pos_trips: 1                    # 1 concurrent trip
  txf_symbol: "TXFD6"
  tmf_symbol: "TMFD6"
  hedge_ratio_tmf_per_txf: 20         # FIXED by physics (200/10)

latency_profile: "shioaji_sim_p95_v2026-03-04"

