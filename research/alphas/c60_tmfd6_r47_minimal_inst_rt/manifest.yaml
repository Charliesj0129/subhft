hypothesis: >
  R47-minimal three-layer mechanism (deployed on TXFD6 as C33 PROMOTE,
  R7-prior) transfers to TMFD6 once cost-drag drops from 200% (retail
  RT 4 pt) to 75% (inst RT 1.5 pt). Same pattern, different cost regime.
  Empirical CK-direct counterfactual (25 TMFD6 days, qf=1.0, spread>=5,
  max_pos=1) yields +22,451 NTD/day at inst RT, robust under +/-30% RT
  sensitivity (+19,191 to +25,710 NTD/day). Non-|pos|-gated (avoids
  C22-class meta-kill).

mechanism_class: pure_maker

distinction_from_killed_classes:
  - name: "TMFD6-multi-instrument (R51-C1b)"
    distinction: >
      R51-C1b was a 2-leg pair strategy using TMFD6 as a hedge leg;
      proven -109K NTD at retail cost drag 200%. C60 is single-leg on
      TMFD6 only with cost regime changed from 200% drag to 75% drag.
      Different mechanism, different leg structure, different cost
      regime, and empirical counterfactual is strongly positive
      (+22,451 NTD/day at inst CK-direct re-price).
  - name: "spread-conditional-maker (R16)"
    distinction: >
      C60 uses fixed spread threshold (5 pt). Not dynamic; not
      adaptive; not session-variant. R14-prior structural-break rule
      enforced.
  - name: "c22_class_meta_killed_pnl_concentrates_at_max_pos"
    distinction: >
      C60 uses D3 MFG skew OFF (effectively no skew modulation by
      |pos|) and D4 QI skew gated on L1 book imbalance (NOT |pos|).
      Inventory skew is linear in pos (not |pos|-thresholded). Does
      not reproduce the R15-prior V-shape destroying pattern.
  - name: "C33 TXFD6 deployed R47-minimal"
    distinction: >
      Different instrument (TMF vs TXF), different point value
      (10 vs 200 NTD/pt), different cost regime (inst 1.5 vs retail 3).
      Same R47 framework, distinct deploy parameters.

