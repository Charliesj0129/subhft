    R47 framework (spread gate + inventory skew + max_pos cap) reused
    verbatim from C33. Three signal layers (D1 PE, D2 queue, D3 MFG)
    DISABLED. The D4 QI skew layer is retained per deployed TMFD6
    R47-minimal config (threshold 0.10, widen 1 tick). QI computed on
    top-of-book imbalance (not |pos|).

