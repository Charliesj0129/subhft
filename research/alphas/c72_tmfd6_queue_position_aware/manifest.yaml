gate_position: "T4 implementation (post T1 CONDITIONAL PROCEED, pre T2 APPROVE)"

hypothesis: >
  Overlay on C60 (PROMOTED TMFD6 R47-minimal, R1): quote only when
  near-side L1 queue depth is below threshold (CK-observable proxy for
  self-queue-position near top). Non-|pos|-gated — gate is on L1 depth,
  not |pos|. Researcher T1 flagged dominance risk: C60 baseline per-trip
  edge must improve by >=2x to offset 30-44% fill-retention loss from
  the gate. T5 is the arbiter.

mechanism_class: pure_maker

distinction_from_killed_classes:
  - name: "R47 D2 Queue-Cancel layer (hft-mm-design SKILL)"
    distinction: >
      R47 D2 Queue layer was DISABLED because PowerProb fill-prob model
      was 14x pessimistic. C72 uses CK-observable L1 depth gate (bid_qty,
      ask_qty) as proxy, NOT a simulated queue-rank. Researcher T1 concern
      #3: this sidesteps the PowerProb trap, but is a DIFFERENT mechanism
      (thin-near-side-queue gate vs fill-probability model).
  - name: "C22-class |pos|-gated skew meta-kill"
    distinction: >
      C72 gate is on OBSERVABLE L1 queue depth (bid_qty, ask_qty), NOT on
      |pos|. Inventory skew is LINEAR in pos (same as C60). No |pos|-threshold.
  - name: "spread-conditional-maker (R16, stay_killed)"
    distinction: >
      C72 uses fixed queue-depth thresholds, not spread-conditional.
      Threshold is static per param; T5 sweeps {2,5,10,20} as parameter
      variants only.

