  dominance_check_vs_c60_required: true
  reason: >
    cost_model.confirmed=false; overlay must beat C60 baseline under
    same cost assumptions AND be robust to Lipton-PSS 2013 asymmetric
    queue-imbalance adverse-selection finding.

t1_carry_forward_flags:
