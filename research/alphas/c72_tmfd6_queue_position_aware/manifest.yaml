h2_framework:
  adjudication: "MAKER FULL-CYCLE, queue-depth-overlay on C60"
  conditional_on: >
    T5 must demonstrate (a) per-trip gross on gated trips exceeds C60
    ungated baseline per-trip by 30%+ (dominance-risk test), OR
    (b) the gate strictly reduces adverse selection by >20% without
    reducing fill count below 50% of C60 baseline. If neither: T6 REJECT.
    Lipton-PSS 2013 caution: thin-near-side queue may be adverse-selection
    signal; T5 must report per-trip edge conditioned on gate.

promote_prerequisites:
