alpha_id: multiscale_trend_reversion
hypothesis: >
  Intraday price trends revert at sub-hour horizons following a universal
  cubic scaling law: E[R(t+1)] = a + b*phi(t) + c*phi(t)^3, where phi is
  the standardized trend strength (t-statistic). The linear coefficient b
  flips sign around T=30 min (reversion -> trending), while the cubic term c
  always opposes the linear term, creating a critical threshold phi_c =
  sqrt(-b/(3c)) beyond which strong trends reverse. Multi-horizon monitoring
  (2-64 min) detects when any horizon's phi crosses its critical threshold,
  generating a contrarian signal. This extends CBS's fixed 40bps/600s trigger
  to an adaptive, horizon-dependent z-score framework grounded in empirical
  universality across 14 years of tick data and 30 years of daily data.

formula: >
  phi_T(t) = EMA_T(R) / sqrt(EMA_T(R^2) - EMA_T(R)^2) * sqrt(N_eff);
  E[R] = a + b*phi + c*phi^3;
  signal = -sign(phi) when |phi| > phi_c = sqrt(-b/(3c)) for actionable horizons.
  Forward IC computed as rank_correlation(phi_T, R_{t+k}) for k in {1,5,10,30} min.

