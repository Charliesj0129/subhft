alpha_id: c17_tmf_frontmonth_native_maker
name: "R47 Maker on TMF Rolling Front-Month (SWITCH with deployed TMFD6 R47)"
version: "0.1.0"
status: prototype
owner: alpha-research-20260417-0815
strategy_type: maker
instrument: TMF_frontmonth
instruments:
  - TMFB6
  - TMFC6
  - TMFD6

hypothesis: >
  R47's structural edge (V-shape recovery via max_pos=3, minimal skew,
  fresh-quote replacement) is venue-invariant. TMF rolling front-month
  (TMFB6 → TMFC6 → TMFD6) shows a stable 2-3 pt spread regime — the
  earlier "TMFD6 Jan-Feb → March regime shift" was contract-rotation
  artifact (Jan-Feb TMFD6 was back-month at 28 pt; TMFB6 was the real
  front-month at 2 pt). See R10-T1 §0 for full retrospective.

switch_semantics: >
  C17 REPLACES the deployed TMFD6 R47 max_pos=1 strategy. Must NOT run
  simultaneously (would replicate R51-C1b TMFD6-multi-instrument kill,
  net -109K NTD). Live deployment requires: (a) disable the deployed
  `R47_MAKER_TMF` entry in strategies.yaml, (b) flatten TMFD6 position,
  (c) enable `C17_TMF_FRONTMONTH_MAKER`. See SHADOW_DEPLOY.md.

paper_refs:
  - r47_maker_strategy
  - r47_structural_properties
  - r47_backtest_data_regression
  - c14_txf_frontmonth_native_maker
  - "2008 Avellaneda-Stoikov HFT in LOB"

signals:
  reuse: "R47 three-layer (PE regime / queue survival / MFG skew). Minimal-layer defaults — all signal layers disabled, L1 spread gate is the dominant filter."

parameters:
  spread_threshold_pts: 5           # TMF RT 4.0 pt; 5 = consistent with deployed R47 TMFD6
  pe_danger_threshold: 0.0          # disabled (R47 structural)
  pe_window: 100
  queue_cancel_threshold: 1.0       # disabled
  queue_ema_alpha: 0.05
  mfg_skew_z_threshold: 100.0       # disabled
  mfg_ema_alpha: 0.01
  max_pos: 3                        # R47 non-linear optimum
  inventory_skew_tenths: 2          # 0.2 ticks/contract fixed skew

rollover:
  rule: "volume_crossover_with_calendar_fallback"
  calendar_windows:
    TMFB6: "2026-01-26..2026-02-25"
    TMFC6: "2026-02-26..2026-03-18"
    TMFD6: "2026-03-19..2026-04-14"
  boundary_behaviour: "flatten_outgoing_before_quoting_incoming"
  cost_accounting: "rollover-day slippage included in backtest"

latency_profile: "sim_p95_v2026-02-26"

cost_model:
  TMFB6:
    commission_pts_per_side: 1.3
    tax_pts_per_side: 0.7
    point_value_nwd: 10
  TMFC6:
    commission_pts_per_side: 1.3
    tax_pts_per_side: 0.7
    point_value_nwd: 10
  TMFD6:
    commission_pts_per_side: 1.3
    tax_pts_per_side: 0.7
    point_value_nwd: 10

expected_edge:
  note: "T5 backtest will produce real numbers. TMF RT 4.0 pt is 8.3x TXF's 0.48 pt; expected cost-to-spread ratio is higher, so PnL/fill will be lower than C14 in proportion."
  rt_cost_pts: 4.0
  point_value_ntd: 10

governance:
  t1_proposal: outputs/team_artifacts/alpha-research/round-10/artifacts/t1_researcher_proposal.md
  t2_review: outputs/team_artifacts/alpha-research/round-10/artifacts/t2_challenger_review.md
  t2_verdict: APPROVE
  t2_warn: "P2 engineering, P3 correlated-TAIEX-risk (C14 + C17 both track TAIEX)"
  c14_precedent: outputs/team_artifacts/alpha-research/round-6/artifacts/t5_executor_scorecard_revised.md

notes:
  - "Reuses R47 quoting sub-states via composition from research.alphas.r47_maker_pivot.impl. R47 code and C14 code are both unmodified."
  - "Research-module float exception applies (rule 11 of 25-architecture-governance). Strategy operates on integer prices from CK source at scale=1_000_000."
  - "TMF scale is x10000 in live pipeline (same as TXF). CK storage is x1_000_000. See feedback memory golden_data_scale."
  - "SWITCH from deployed TMFD6 R47 max_pos=1 — see switch_semantics above."
