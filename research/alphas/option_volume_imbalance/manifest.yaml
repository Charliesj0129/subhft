alpha_id: option_volume_imbalance
hypothesis: >
  TXO options put-call volume or quote imbalance predicts TMFD6 futures
  direction at 10-60 min horizons. Cross-asset signal is orthogonal to
  all L1 microstructure approaches.

formula: >
  OVI = (call_quote_activity - put_quote_activity) / total_activity;
  Signal = sign(OVI) when |OVI| > threshold.

paper_refs:
  - "2201.09319"  # Michael et al. 2022 — Option Volume Imbalance

data_fields:
  - TXO bid/ask quotes (bids_price, asks_price, bids_vol, asks_vol)

complexity: "O(N_strikes)"
status: DRAFT

data_availability_assessment:
  finding: >
    TXO data in ClickHouse is BidAsk/Snapshot ONLY — no trade data.
    Zero rows with volume > 0 or price_scaled > 0.
    The bids_vol/asks_vol fields represent QUOTE DEPTH (1-2 lots),
    NOT traded volume. This means the Michael et al. OVI paper
    (which requires trade volumes decomposed by participant class)
    CANNOT be directly replicated.

  alternative_signals_from_L1:
    - "Put-call quote activity imbalance (bid/ask update frequency)"
    - "Implied vol proxy from option bid-ask midpoints"
    - "Put-call depth ratio across strikes"
    - "Option spread dynamics as sentiment proxy"

  data_structure:
    total_rows: 33787111
    types: ["BidAsk", "Snapshot"]
    trade_data: false
    volume_data: false
    quote_depth: "bids_vol/asks_vol = order book depth (1-10 lots)"
    symbols_mar_2026: 138  # 69 calls + 69 puts
    strike_range: "29100 to 34700 (100-pt increments)"
    month_codes: "Call: A-L, Put: M-X"
    tick_rate: "~2000-55000 updates/day per symbol"
