hypothesis: >
  Back-month TXF contract entering rollover (becoming new-front in 3 days)
  exhibits a narrow-spread window (median 12-16 pt, TXFD6 Feb 2026-02-23..25
  analog) with non-trivial trade activity (747-1323 trades/day). C68 quotes
  passively on the transitioning back-month during this window only, via
  calendar gate + spread gate. Per-trip gross 14 pt vs combined inst RT 3 pt
  = +7.8 pt/RT margin (linear estimate; R1 lesson: 5-8x optimistic vs fresh
  sim). Task-brief "hedge pair" framing REJECTED per Researcher T1: TAKE
  hedge leg inverts edge to negative (-0.9 pt/RT). C68 is SOLO PASSIVE MAKER
  with rollover-window calendar gate.

mechanism_class: pure_maker    # NOT cross_instrument_mm (T1 rejected hedge leg)

distinction_from_killed_classes:
  - name: "R8-prior C36 txf_intra_family_hedge_pair_retired_contract"
    distinction: >
      C36 was killed because the targeted contract was RETIRED (expired, no
      trading). C68 targets the ACTIVE transition window when the back-month
      becomes new-front. CK pre-screen (Researcher T1) confirms 747-1323
      trades/day during the transition window (not zero). Distinct temporal
      context.
  - name: "R5-prior C30 hedge-qty notional-matching error"
    distinction: >
      C68 is SOLO on TXFE6 per Researcher T1 rejection of the hedge framing.
      No cross-instrument leg -> R5 hedge-qty rule N/A.
  - name: "C33 TXFD6 PROMOTE / C33-variants cluster"
    distinction: >
      Different instrument scope (back-month TXFE6 vs front-month TXFD6) and
      different temporal window (3-day rollover vs continuous day session).
      Novel axis under B (inst RT enables back-month trading at all).
  - name: "Deep-back-month trading attempts"
    distinction: >
      C68 explicitly targets the NARROW-spread transition window (median
      12-16 pt) NOT the wide-spread deep-back phase (median 200-1300 pt).
      Calendar gate prevents drift into deep-back regime.

