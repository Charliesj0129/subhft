    T5 must demonstrate close-side fills are MAKER for >=80% of cycles
    (C33 precedent 97.7%). If <80% OR fresh-sim NTD/day is net-negative OR
    analog-only sample < 3 days, framework collapses and T6 REJECTs. R1
    lesson: T5 fresh CK-direct typically 5-8x less than linear re-price.

