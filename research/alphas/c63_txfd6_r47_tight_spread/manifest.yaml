hypothesis: >
  R47-minimal on TXFD6 with spread_threshold_pts=3 (lowered from C33's 5)
  under institutional-tier TXF RT 1.5 pt. At inst RT 1.5 pt (half of retail
  3 pt), the 3 pt spread band becomes profitable half-spread (gross 3 pt -
  RT 1.5 pt = +1.5 pt margin per full cycle). Captures more cycles in
  compressed-regime TXFD6 sessions while preserving non-|pos|-gated
  discipline. Mechanism transfer from C33 PROMOTE (R7-prior) with a
  single-lever change — fixed threshold, NOT session-adaptive (R14-prior
  structural-break guard).

mechanism_class: pure_maker

distinction_from_killed_classes:
  - name: "C33 TXFD6 solo passive maker (R7-prior PROMOTE)"
    distinction: >
      C63 is a parameter variant of C33 with a single lever changed:
      `spread_threshold_pts` lowered from 5 to 3. Everything else matches
      C33 research operating point (mp=3, queue_share=0.05, R47-minimal
      signal layers OFF). R13-prior parameter-variant-of-PROMOTED rule
      applied: no new mp/q sweep proposed — only the threshold lever.
  - name: "spread-conditional-maker (R16, stay_killed)"
    distinction: >
      R16 was killed for adverse-selection trap via dynamic/adaptive
      spread-triggered quoting. C63 uses a FIXED threshold (3 pt), not
      conditional/dynamic/session-adaptive. R14-prior structural-break
      guard: lever change is structural (cost regime change), not
      session-variant.
  - name: "txfd6_dynamic_spread_threshold_structural_break_not_session_variant (R14-prior C41)"
    distinction: >
      C41-prior was killed for session-variant dynamic threshold without
      structural-break justification. C63's threshold is FIXED, and the
      justification is explicit: inst RT 1.5 pt halves retail 3 pt RT,
      which structurally re-prices the 3 pt spread band from break-even to
      +1.5 pt margin. This IS a structural-break justification, not a
      session-variant.
  - name: "c22_class_meta_killed_pnl_concentrates_at_max_pos"
    distinction: >
      C63 uses only inventory skew LINEAR in pos (0.2 ticks/contract);
      no |pos|-gate, no skew-at-max-pos modulation. C22-class meta-kill
      does not recur.

