alpha_id: rv_ratio_regime
hypothesis: >
  Multi-scale realized volatility ratio (RV_5s / RV_300s) detects calm vs breakout
  regimes. Low vrr = range-bound (CBS favorable). High vrr = event/breakout (CBS unfavorable).
  Orthogonal to existing features (R20 rho=0.053). Use as CBS regime gate.
formula: "vrr_t = EW_var(ret, halflife=5s) / EW_var(ret, halflife=300s)"
paper_refs:
  - "2006.08307v1"  # Christensen+2020 HMM+RV ratio
  - "2501.16772v2"  # Safari+2025 Trends and Reversion
  - "2105.09140v3"  # Garcin 2021 fBm Forecasting
data_fields:
  - mid_price
  - local_ts
complexity: "O(1)"
status: GATE_ZERO
tier: filter
feature_set_version: "lob_shared_v2"
latency_profile: "shioaji_sim_p95_v2026-03-04"
