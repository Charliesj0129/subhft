hypothesis: >
  [INVALID 2026-04-18] R47's structural edge is venue-invariant within
  the same cost-structure class. Running R47 on TXF rolling front-month
  captures the same edge at a more favourable cost-to-spread ratio.
  CORRECTION: hypothesis was built on wrong RT (0.48 pt assumed; actual
  ~3 pt retail). True drag is 60-75% on TXF, not 10-16% — close to
  TMFD6's 80-133%, not the 8x advantage claimed. Hypothesis FALSIFIED
  on cost grounds; venue-axis thesis collapses.

